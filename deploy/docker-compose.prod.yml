# XHAgentOS 生产编排
# 部署目录: /opt/xhagentos
# 前端默认 :18082，后端 :18002（不常用端口，避免冲突）

services:
  backend:
    image: ${DOCKER_USERNAME}/xhagentos-backend:${IMAGE_TAG:-latest}
    container_name: xhagentos-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-18002}:35001"
    env_file:
      - .env
    environment:
      - PORT=35001
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FLASK_ENV=production
      # OAuth — env names must NOT use GITHUB_ prefix (Actions reserved)
      - OAUTH_BASE_URL=${OAUTH_BASE_URL:-}
      - OAUTH_GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID:-}
      - OAUTH_GITHUB_CLIENT_SECRET=${OAUTH_GITHUB_CLIENT_SECRET:-}
      - OAUTH_QQ_CLIENT_ID=${OAUTH_QQ_CLIENT_ID:-}
      - OAUTH_QQ_CLIENT_SECRET=${OAUTH_QQ_CLIENT_SECRET:-}
    volumes:
      - xh-data:/app/database
      - xh-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:35001/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    image: ${DOCKER_USERNAME}/xhagentos-frontend:${IMAGE_TAG:-latest}
    container_name: xhagentos-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-18082}:80"
    depends_on:
      - backend

volumes:
  xh-data:
  xh-logs:
