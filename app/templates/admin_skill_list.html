<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - XHAgentOS</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('lib/layui/css/layui.css') }}">
    <style>
        body { padding: 15px; background: #f5f6fa; }
        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8e8e8;
        }
        .page-title .layui-icon {
            font-size: 20px;
            margin-right: 6px;
            color: #5fb878;
        }
        .toolbar {
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        .description-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div>
    <div class="page-title">
        <i class="layui-icon layui-icon-diamond"></i> 技能管理
    </div>

    <div class="toolbar">
        <button class="layui-btn layui-btn-sm layui-btn-normal" onclick="openAdd()">
            <i class="layui-icon layui-icon-add-1"></i> 新增技能
        </button>
        <div class="search-box">
            <input type="text" id="searchKeyword" placeholder="技能名称" class="layui-input" style="width: 200px;">
            <button class="layui-btn layui-btn-sm" onclick="doSearch()">
                <i class="layui-icon layui-icon-search"></i> 搜索
            </button>
        </div>
    </div>

    <table id="skillTable" lay-filter="skillTable"></table>
</div>

<script type="text/html" id="toolbarTpl">
    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
</script>

<script src="{{ static_url('lib/layui/layui.js') }}"></script>
<script>
// 去除 Markdown 格式，生成纯文本预览
function markdownToPlainText(text) {
    if (!text) return '-';
    return text
        .replace(/#{1,6}\s/g, '')       // 去掉标题符号
        .replace(/\*\*|__/g, '')        // 去掉粗体
        .replace(/\*|_/g, '')           // 去掉斜体
        .replace(/`{1,3}/g, '')          // 去掉代码
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')  // 链接改为文字
        .replace(/!\[([^\]]*)\]\([^)]+\)/g, '$1') // 图片链接
        .replace(/^\s*[-*+]\s/gm, '')   // 去掉列表符号
        .replace(/^\s*\d+\.\s/gm, '')   // 去掉有序列表
        .replace(/^\s*>\s/gm, '')       // 去掉引用
        .replace(/\n+/g, ' ')           // 换行变空格
        .trim();
}

function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : undefined;
}
layui.$.ajaxSetup({
    beforeSend: function(xhr) {
        xhr.setRequestHeader('X-Xsrftoken', getCookie('_xsrf'));
    }
});

layui.use(['table', 'layer', 'form'], function(){
    var table = layui.table;
    var layer = layui.layer;
    var $ = layui.$;
    var form = layui.form;

    var tableIns = table.render({
        elem: '#skillTable',
        url: '/admin/skill/api',
        page: {
            limit: 10,
            limits: [10, 20, 50]
        },
        cols: [[
            {type: 'numbers', title: '序号', width: 80, align: 'center'},
            {field: 'name', title: '技能名称', minWidth: 150},
            {field: 'description', title: '描述', minWidth: 250,
                templet: function(d){
                    var plainText = markdownToPlainText(d.description);
                    return '<div class="description-cell" title="' + plainText + '">' + plainText + '</div>';
                }},
            {field: 'create_at', title: '创建时间', width: 180, sort: true},
            {title: '操作', width: 150, align: 'center', toolbar: '#toolbarTpl'}
        ]],
        response: {
            statusCode: 0
        },
        parseData: function(res){
            return {
                code: res.code,
                msg: res.msg,
                count: res.count,
                data: res.data
            };
        }
    });

    // 搜索
    window.doSearch = function() {
        tableIns.reload({
            where: { keyword: $('#searchKeyword').val() },
            page: { curr: 1 }
        });
    };

    // 回车搜索
    $('#searchKeyword').on('keydown', function(e){
        if(e.keyCode === 13) doSearch();
    });

    // 监听工具条
    table.on('tool(skillTable)', function(obj){
        var data = obj.data;
        if(obj.event === 'edit'){
            openEdit(data.id);
        } else if(obj.event === 'del'){
            layer.confirm('确定要删除该技能吗？', {icon: 3, title: '提示'}, function(index){
                $.post('/admin/skill/delete', {id: data.id}, function(res){
                    if(res.code === 0){
                        layer.msg('删除成功', {icon: 1});
                        tableIns.reload();
                    } else {
                        layer.msg(res.msg, {icon: 2});
                    }
                });
                layer.close(index);
            });
        }
    });

    // 新增弹窗
    window.openAdd = function() {
        layer.open({
            type: 1,
            title: '新增技能',
            area: ['500px', '350px'],
            content: `
                <form class="layui-form" style="padding: 20px;" lay-filter="addForm">
                    <div class="layui-form-item">
                        <label class="layui-form-label">技能名称</label>
                        <div class="layui-input-block">
                            <input type="text" name="name" required lay-verify="required" placeholder="请输入技能名称" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item layui-form-text">
                        <label class="layui-form-label">技能描述</label>
                        <div class="layui-input-block">
                            <textarea name="description" placeholder="支持 Markdown 格式" class="layui-textarea"></textarea>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-input-block">
                            <button class="layui-btn" lay-submit lay-filter="submitAdd">提交</button>
                            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                        </div>
                    </div>
                </form>
            `,
            success: function(layero, index){
                form.render();
                form.on('submit(submitAdd)', function(data){
                    $.post('/admin/skill/add', data.field, function(res){
                        if(res.code === 0){
                            layer.msg('创建成功', {icon: 1});
                            layer.close(index);
                            tableIns.reload();
                        } else {
                            layer.msg(res.msg, {icon: 2});
                        }
                    });
                    return false;
                });
            }
        });
    };

    // 编辑弹窗
    window.openEdit = function(id) {
        // 先获取数据
        $.get('/admin/skill/api', {page: 1, limit: 1000}, function(res){
            var skill = res.data.find(function(item){ return item.id === id; });
            if(!skill){
                layer.msg('技能不存在', {icon: 2});
                return;
            }
            layer.open({
                type: 1,
                title: '编辑技能',
                area: ['500px', '350px'],
                content: `
                    <form class="layui-form" style="padding: 20px;" lay-filter="editForm">
                        <input type="hidden" name="id" value="${skill.id}">
                        <div class="layui-form-item">
                            <label class="layui-form-label">技能名称</label>
                            <div class="layui-input-block">
                                <input type="text" name="name" required lay-verify="required" value="${skill.name}" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">技能描述</label>
                            <div class="layui-input-block">
                                <textarea name="description" placeholder="支持 Markdown 格式" class="layui-textarea">${skill.description || ''}</textarea>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-input-block">
                                <button class="layui-btn" lay-submit lay-filter="submitEdit">提交</button>
                            </div>
                        </div>
                    </form>
                `,
                success: function(layero, index){
                    form.render();
                    form.on('submit(submitEdit)', function(data){
                        $.post('/admin/skill/edit', data.field, function(res){
                            if(res.code === 0){
                                layer.msg('更新成功', {icon: 1});
                                layer.close(index);
                                tableIns.reload();
                            } else {
                                layer.msg(res.msg, {icon: 2});
                            }
                        });
                        return false;
                    });
                }
            });
        });
    };
});
</script>
</body>
</html>
