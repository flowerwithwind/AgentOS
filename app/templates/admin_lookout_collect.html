<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - XHAgentOS</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('lib/layui/css/layui.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            padding: 32px;
            background: #070b14;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #c8d6e5;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0, 180, 255, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(88, 101, 242, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 255, 200, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .page-wrap { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }

        .search-section {
            text-align: center;
            padding: 60px 20px 40px;
        }
        .search-section h1 {
            font-size: 36px; font-weight: 700; margin-bottom: 8px;
            background: linear-gradient(135deg, #00b4ff, #5865f2, #00ffc8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .search-section p { color: rgba(200,214,229,0.4); font-size: 14px; margin-bottom: 30px; }

        .search-box {
            display: flex; align-items: center; justify-content: center; gap: 0;
            max-width: 640px; margin: 0 auto;
            background: rgba(20, 30, 50, 0.8);
            border: 1px solid rgba(0, 180, 255, 0.2);
            border-radius: 50px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .search-box:focus-within {
            border-color: #00b4ff;
            box-shadow: 0 0 30px rgba(0, 180, 255, 0.15);
        }
        .search-box input {
            flex: 1; padding: 14px 24px; border: none; background: transparent;
            color: #c8d6e5; font-size: 16px; outline: none;
        }
        .search-box input::placeholder { color: rgba(200,214,229,0.3); }
        .search-box button {
            padding: 14px 32px; border: none;
            background: linear-gradient(135deg, #00b4ff, #5865f2);
            color: #fff; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .search-box button:hover { background: linear-gradient(135deg, #0099dd, #4854d0); }

        /* 源选择开关面板 */
        .source-panel {
            max-width: 640px; margin: 20px auto 0;
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
        }
        .source-toggle {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            color: rgba(200,214,229,0.5);
            cursor: pointer; font-size: 13px; transition: all 0.3s;
            user-select: none;
        }
        .source-toggle.active {
            border-color: #00b4ff;
            background: rgba(0, 180, 255, 0.1);
            color: #00b4ff;
            box-shadow: 0 0 20px rgba(0, 180, 255, 0.1);
        }
        .source-toggle .indicator {
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .source-toggle.active .indicator { background: #2ed573; box-shadow: 0 0 8px rgba(46,213,115,0.5); }

        /* 参数面板 */
        .param-panel {
            max-width: 640px; margin: 16px auto 0;
            display: none; align-items: center; justify-content: center; gap: 16px;
            padding: 14px 20px;
            background: rgba(20, 30, 50, 0.5);
            border: 1px solid rgba(0, 180, 255, 0.1);
            border-radius: 12px;
        }
        .param-panel.show { display: flex; }
        .param-panel label { font-size: 12px; color: rgba(200,214,229,0.5); white-space: nowrap; }
        .param-panel input {
            width: 80px; padding: 6px 10px; border-radius: 6px;
            border: 1px solid rgba(0, 180, 255, 0.2);
            background: rgba(0,0,0,0.3); color: #c8d6e5; font-size: 13px;
            text-align: center; outline: none;
        }
        .param-panel input:focus { border-color: #00b4ff; }

        /* 结果橱窗 - 不依赖layui风格 */
        .result-section { margin-top: 32px; }
        .result-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .result-header h2 { font-size: 18px; font-weight: 600; color: rgba(200,214,229,0.8); }
        .result-header .count-badge {
            padding: 4px 14px; border-radius: 20px;
            background: rgba(0, 180, 255, 0.1);
            color: #00b4ff; font-size: 12px;
        }
        .select-all-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 6px;
            background: rgba(0, 180, 255, 0.1);
            border: 1px solid rgba(0, 180, 255, 0.2);
            color: #00b4ff; font-size: 12px;
            cursor: pointer; transition: all 0.3s;
        }
        .select-all-btn:hover { background: rgba(0, 180, 255, 0.15); }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        @media (max-width: 1000px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .card-grid { grid-template-columns: 1fr; } }

        .result-card {
            background: linear-gradient(145deg, rgba(20, 30, 50, 0.9), rgba(10, 14, 23, 0.95));
            border: 1px solid rgba(0, 180, 255, 0.1);
            border-radius: 12px; padding: 16px;
            transition: all 0.3s;
            position: relative;
            cursor: pointer;
        }
        .result-card:hover {
            border-color: rgba(0, 180, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 180, 255, 0.08);
        }
        .result-card.selected {
            border-color: #00b4ff;
            background: linear-gradient(145deg, rgba(0, 180, 255, 0.1), rgba(0, 180, 255, 0.02));
            box-shadow: 0 0 20px rgba(0, 180, 255, 0.15);
        }
        .result-card .card-title {
            font-size: 14px; font-weight: 600; color: #e8f0fe;
            margin-bottom: 8px; line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .result-card .card-title a { color: #e8f0fe; text-decoration: none; }
        .result-card .card-title a:hover { color: #00b4ff; }
        .result-card .card-summary {
            font-size: 12px; color: rgba(200,214,229,0.5);
            margin-bottom: 10px; line-height: 1.6;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        .result-card .card-meta {
            display: flex; justify-content: space-between;
            font-size: 11px; color: rgba(200,214,229,0.3);
        }

        .loading-spinner {
            text-align: center; padding: 60px 0;
        }
        .loading-spinner .spinner {
            width: 40px; height: 40px; margin: 0 auto 12px;
            border: 3px solid rgba(0,180,255,0.1);
            border-top-color: #00b4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast-custom {
            position: fixed; top: 20px; right: 20px; z-index: 99999;
            padding: 12px 24px; border-radius: 8px; font-size: 14px;
            background: rgba(0,0,0,0.85); color: #c8d6e5;
            backdrop-filter: blur(10px);
            animation: fadeInOut 2s ease forwards;
        }
        .toast-custom.success { border-left: 3px solid #2ed573; }
        .toast-custom.error { border-left: 3px solid #ff4757; }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-10px); }
            10% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        .card-checkbox {
            position: absolute; top: 12px; right: 12px;
            width: 16px; height: 16px; cursor: pointer;
            accent-color: #00b4ff;
        }
        .batch-bar {
            display: none; align-items: center; gap: 12px;
            padding: 12px 20px; margin-top: 16px;
            background: rgba(0, 180, 255, 0.05);
            border: 1px solid rgba(0, 180, 255, 0.15);
            border-radius: 10px;
        }
        .batch-bar.show { display: flex; justify-content: center; }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="search-section">
        <h1>🔭 瞭望采集</h1>
        <p>输入关键词，选择采集源，一键智能采集</p>
        <div class="search-box">
            <input id="keywordInput" placeholder="输入关键词，如：西华大学..." onkeydown="if(event.key==='Enter')startCollect()">
            <button onclick="startCollect()">采集</button>
        </div>
        <div class="source-panel" id="sourcePanel">
            {% for s in sources %}
            <div class="source-toggle" data-id="{{ s['id'] }}" data-name="{{ s['name'] }}" data-ps="{{ s['page_size'] }}" onclick="toggleSource(this)">
                <span class="indicator"></span>
                <span>{{ s['name'] }}</span>
            </div>
            {% end %}
        </div>
        <div class="param-panel" id="paramPanel">
            <label>一次有效采集条数</label>
            <input id="pageSizeInput" type="number" value="10" min="1" max="50">
        </div>
    </div>

    <div class="result-section">
        <div class="result-header">
            <h2>采集结果</h2>
            <div style="display: flex; align-items: center; gap: 12px;">
                <span class="count-badge" id="resultCount">0 条</span>
                <div class="select-all-btn" id="selectAllBtn" style="display: none;" onclick="toggleSelectAll()">
                    <input type="checkbox" id="selectAllCheckbox" style="width:14px;height:14px;accent-color:#00b4ff;">
                    <span>全选</span>
                </div>
            </div>
        </div>
        <div id="resultGrid" class="card-grid"></div>
        <div class="batch-bar" id="batchBar">
            <span>已选 <strong id="selectedCount">0</strong> 条</span>
            <button class="btn-neon btn-neon-sm" onclick="saveSelected()">保存到数据仓库</button>
        </div>
    </div>
</div>

<script src="{{ static_url('lib/layui/layui.js') }}"></script>
<script>
function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : undefined;
}
var $ = layui.$;
layui.$.ajaxSetup({
    beforeSend: function(xhr) { xhr.setRequestHeader('X-Xsrftoken', getCookie('_xsrf')); }
});

var selectedSourceId = 0;
var collectedData = [];
var selectedItems = {};

function toggleSource(el) {
    $(el).toggleClass('active');
    var activeSources = $('.source-toggle.active');
    if(activeSources.length > 0) {
        selectedSourceId = parseInt(activeSources.first().data('id'));
        var ps = activeSources.first().data('ps');
        $('#pageSizeInput').val(ps || 10);
        $('#paramPanel').addClass('show');
    } else {
        selectedSourceId = 0;
        $('#paramPanel').removeClass('show');
    }
}

function showToast(msg, type) {
    var t = $('<div class="toast-custom '+(type||'')+'">'+msg+'</div>');
    $('body').append(t);
    setTimeout(function(){ t.remove(); }, 2500);
}

function startCollect() {
    var keyword = $('#keywordInput').val().trim();
    if(!keyword) { showToast('请输入关键词', 'error'); return; }
    if(!selectedSourceId) { showToast('请选择采集源', 'error'); return; }

    var pageSize = parseInt($('#pageSizeInput').val()) || 10;
    var elapsedPages = Math.max(0, Math.ceil(pageSize / 10) - 1);

    $('#resultGrid').html('<div class="loading-spinner" style="grid-column:1/-1;"><div class="spinner"></div><div>采集中，请稍候...</div></div>');

    $.post('/admin/lookout/collect/api', {
        source_id: selectedSourceId,
        keyword: keyword,
        page: elapsedPages,
        page_size: pageSize,
    }, function(res){
        if(res.code === 0) {
            collectedData = res.data || [];
            renderResults(collectedData);
            showToast(res.msg, 'success');
        } else {
            $('#resultGrid').html('<div style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,71,87,0.6);">'+res.msg+'</div>');
            showToast(res.msg, 'error');
        }
    });
}

function renderResults(data) {
    $('#resultCount').text(data.length + ' 条');
    selectedItems = {};
    updateBatchBar();
    $('#selectAllCheckbox').prop('checked', false);
    $('#selectAllBtn').toggle(data && data.length > 0);
    if(!data || data.length === 0) {
        $('#resultGrid').html('<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:rgba(200,214,229,0.3);">暂无结果</div>');
        return;
    }
    var html = '';
    data.forEach(function(item, idx){
        var title = item.title || '无标题';
        var summary = item.summary || '暂无摘要';
        var url = item.url || '';
        var sourceName = item.source_name || '未知来源';
        html += '<div class="result-card" onclick="toggleCardSelect(this, '+idx+')">';
        html += '<input type="checkbox" class="card-checkbox" value="'+idx+'" onchange="toggleSelect(this)">';
        html += '<div class="card-title">'+(url?'<a href="'+url+'" target="_blank">':'')+title+(url?'</a>':'')+'</div>';
        html += '<div class="card-summary">'+summary+'</div>';
        html += '<div class="card-meta"><span>'+sourceName+'</span><span>'+item.publish_time+'</span></div>';
        html += '</div>';
    });
    $('#resultGrid').html(html);
}

function toggleCardSelect(cardEl, idx) {
    var checkbox = $(cardEl).find('.card-checkbox');
    checkbox.prop('checked', !checkbox.prop('checked'));
    toggleSelect(checkbox[0]);
}

function toggleSelect(el) {
    var idx = parseInt(el.value);
    var cardEl = $(el).closest('.result-card');
    if(el.checked) {
        selectedItems[idx] = collectedData[idx];
        cardEl.addClass('selected');
    } else {
        delete selectedItems[idx];
        cardEl.removeClass('selected');
    }
    updateBatchBar();
    updateSelectAllCheckbox();
}

function toggleSelectAll() {
    var isChecked = $('#selectAllCheckbox').prop('checked');
    $('.card-checkbox').each(function() {
        $(this).prop('checked', isChecked);
        toggleSelect(this);
    });
}

function updateSelectAllCheckbox() {
    var total = $('.card-checkbox').length;
    var checked = $('.card-checkbox:checked').length;
    $('#selectAllCheckbox').prop('checked', total > 0 && total === checked);
}
function updateBatchBar() {
    var cnt = Object.keys(selectedItems).length;
    $('#selectedCount').text(cnt);
    if(cnt > 0) $('#batchBar').addClass('show');
    else $('#batchBar').removeClass('show');
}

function saveSelected() {
    var items = Object.values(selectedItems);
    if(items.length === 0) { showToast('请先选择要保存的条目', 'error'); return; }
    if(!selectedSourceId) { showToast('请选择采集源', 'error'); return; }
    $.post('/admin/lookout/collect/save', {
        source_id: selectedSourceId,
        records: JSON.stringify(items)
    }, function(res){
        showToast(res.msg, res.code===0?'success':'error');
        if(res.code===0) {
            selectedItems = {};
            updateBatchBar();
        }
    });
}
</script>
</body>
</html>
