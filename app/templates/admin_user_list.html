<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - XHAgentOS</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('lib/layui/css/layui.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ static_url('css/design-tokens.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ static_url('css/admin-dark.css') }}">
    <style>
        body { padding: 15px; background: #f5f6fa; }
        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8e8e8;
        }
        .page-title .layui-icon {
            font-size: 20px;
            margin-right: 6px;
            color: #5fb878;
        }
        .toolbar {
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
<div>
    <div class="page-title">
        <i class="layui-icon layui-icon-user"></i> 用户管理
    </div>

    <div class="toolbar">
        <button class="btn-neon btn-neon-sm" onclick="openAdd()">
            <i class="layui-icon layui-icon-add-1"></i> 新增用户
        </button>
    </div>

    <table id="userTable" lay-filter="userTable"></table>
</div>

<script src="{{ static_url('lib/layui/layui.js') }}"></script>
<script>
// XSRF 令牌处理
function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : undefined;
}
layui.$.ajaxSetup({
    beforeSend: function(xhr) {
        xhr.setRequestHeader('X-Xsrftoken', getCookie('_xsrf'));
    }
});

layui.use(['table', 'layer'], function(){
    var table = layui.table;
    var layer = layui.layer;
    var $ = layui.$;

    table.render({
        elem: '#userTable',
        url: '/admin/users/api',
        page: {
            limit: 28,
            limits: [28, 56, 84]
        },
        cols: [[
            {type: 'numbers', title: '序号', width: 80, align: 'center'},
            {field: 'username', title: '用户名', minWidth: 150},
            {field: 'create_at', title: '创建时间', minWidth: 180, sort: true},
            {title: '操作', width: 200, align: 'center',
                templet: function(d){
                    return '<a class="layui-btn layui-btn-xs" onclick="openEdit('+d.id+')">编辑</a>' +
                           '<a class="layui-btn layui-btn-xs layui-btn-danger" onclick="delUser('+d.id+')">删除</a>';
                }
            }
        ]],
        response: {
            statusCode: 0
        },
        parseData: function(res){
            return {
                code: res.code,
                msg: res.msg,
                count: res.count,
                data: res.data
            };
        }
    });

    window.openAdd = function() {
        layer.open({
            type: 2,
            title: '新增用户',
            area: ['500px', '400px'],
            content: '/admin/users/add',
            end: function(){
                table.reload('userTable');
            }
        });
    };

    window.openEdit = function(id) {
        layer.open({
            type: 2,
            title: '编辑用户',
            area: ['500px', '420px'],
            content: '/admin/users/edit?id=' + id,
            end: function(){
                table.reload('userTable');
            }
        });
    };

    window.delUser = function(id) {
        layer.confirm('确定要删除该用户吗？', {icon: 3, title: '提示'}, function(index){
            $.post('/admin/users/delete', {id: id}, function(res){
                if(res.code === 0){
                    layer.msg('删除成功', {icon: 1});
                    table.reload('userTable');
                } else {
                    layer.msg(res.msg, {icon: 2});
                }
            });
            layer.close(index);
        });
    };
});
</script>
</body>
</html>
