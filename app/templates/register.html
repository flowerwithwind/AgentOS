<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - XHAgentOS</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('css/login.css') }}">
    <style>
        .reg-link { text-align:center; margin-top:16px; font-size:14px; color:#8c8c8c; }
        .reg-link a { color:#4a90d9; text-decoration:none; }
        .reg-link a:hover { text-decoration:underline; }
        .success-msg { background:#f6ffed; border:1px solid #b7eb8f; border-radius:8px; padding:10px 16px; color:#52c41a; font-size:13px; margin-bottom:20px; display:none; }
        .success-msg.show { display:block; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-brand">
            <div class="logo-icon">XH</div>
            <h1>XHAgentOS</h1>
            <p>智能数据瞭望与问数系统<br>AI 驱动的企业级数据分析平台</p>
        </div>

        <div class="login-card-wrapper">
            <div class="login-card">
                <div class="card-title">注册账号</div>
                <div class="card-subtitle">创建新账号以使用系统功能</div>

                {% if error %}
                <div class="error-msg show">{{ error }}</div>
                {% else %}
                <div class="error-msg" id="errorMsg"></div>
                {% end %}

                {% if success %}
                <div class="success-msg show">{{ success }}</div>
                {% end %}

                <form method="post" action="/auth/register" id="registerForm">
                    {% module xsrf_form_html() %}
                    <div class="form-group">
                        <label>用户名</label>
                        <div class="input-wrapper">
                            <input type="text" name="username" placeholder="请输入用户名" autocomplete="username" required>
                            <span class="input-icon">&#128100;</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <div class="input-wrapper">
                            <input type="password" name="password" placeholder="请输入密码" autocomplete="new-password" required>
                            <span class="input-icon">&#128274;</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <div class="input-wrapper">
                            <input type="password" name="confirm_password" placeholder="请再次输入密码" autocomplete="new-password" required>
                            <span class="input-icon">&#128274;</span>
                        </div>
                    </div>
                    <button type="submit" class="login-btn">注 册</button>
                </form>

                <div class="reg-link">
                    已有账号？<a href="/auth/login">立即登录</a>
                </div>

                <div class="login-footer">
                    &copy; 2026 XHAgentOS &mdash; All Rights Reserved
                </div>
            </div>
        </div>
    </div>
</body>
</html>
