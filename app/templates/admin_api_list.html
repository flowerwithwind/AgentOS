<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>接口管理</title>
    <link rel="stylesheet" href="{{ static_url('lib/layui/css/layui.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ static_url('css/design-tokens.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ static_url('css/admin-dark.css') }}">
    <style>
        body { background: #f5f6fa; padding: 15px; font-family: -apple-system, sans-serif; }
        .toolbar { margin-bottom: 15px; }
        .api-key-text {
            font-family: 'Courier New', monospace; font-size: 12px;
            color: #1e9fff; background: #f0f7ff; padding: 2px 6px; border-radius: 3px;
            user-select: all; cursor: pointer;
        }
        .api-key-text:hover { background: #e0f0ff; }
        .status-badge { padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .status-badge.on { background: #e8f5e9; color: #5fb878; }
        .status-badge.off { background: #fff3e0; color: #ff9800; }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn-neon btn-neon-sm" id="btnAdd"><i class="layui-icon layui-icon-add-1"></i> 新增令牌</button>
</div>

<table class="layui-table" id="tokenTable" lay-filter="tokenTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>名称</th>
            <th>API密钥</th>
            <th>状态</th>
            <th>调用次数</th>
            <th>创建时间</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<div id="pageBar"></div>

<script src="{{ static_url('lib/layui/layui.js') }}"></script>
<script>
function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : undefined;
}

layui.use(['layer', 'laypage'], function(){
    var layer = layui.layer, laypage = layui.laypage, $ = layui.$;
    $.ajaxSetup({
        beforeSend: function(xhr) { xhr.setRequestHeader('X-Xsrftoken', getCookie('_xsrf')); }
    });

    var currentPage = 1, pageSize = 15;

    function loadData(page) {
        $.get('/admin/api-tokens/api', {page: page || 1, limit: pageSize}, function(res){
            if(res.code !== 0) return;
            var html = '';
            (res.data || []).forEach(function(t){
                var statusHtml = t.status ? '<span class="status-badge on">启用</span>' : '<span class="status-badge off">禁用</span>';
                html += '<tr>'
                     +  '<td>'+t.id+'</td>'
                     +  '<td>'+t.name+'</td>'
                     +  '<td><span class="api-key-text" onclick="copyKey(this)" title="点击复制">'+t.api_key+'</span></td>'
                     +  '<td>'+statusHtml+'</td>'
                     +  '<td>'+t.call_count+'</td>'
                     +  '<td>'+t.create_at+'</td>'
                     +  '<td><button class="layui-btn layui-btn-danger layui-btn-xs" onclick="delToken('+t.id+')">删除</button></td>'
                     +  '</tr>';
            });
            if(!html) html = '<tr><td colspan="7" style="text-align:center;color:#bfbfbf;">暂无数据</td></tr>';
            $('#tokenTable tbody').html(html);

            laypage.render({
                elem: 'pageBar',
                count: res.count || 0,
                limit: pageSize,
                curr: page || 1,
                jump: function(obj, first){
                    if(!first) loadData(obj.curr);
                }
            });
        });
    }
    loadData(1);

    window.delToken = function(id){
        layer.confirm('确定删除该令牌？删除后将无法使用。', function(i){
            $.post('/admin/api-tokens/delete', {id: id}, function(res){
                if(res.code === 0){
                    layer.msg('删除成功');
                    loadData(currentPage);
                } else {
                    layer.msg(res.msg || '删除失败');
                }
            });
            layer.close(i);
        });
    };

    window.copyKey = function(el){
        var text = el.textContent;
        navigator.clipboard.writeText(text).then(function(){
            layer.msg('已复制: ' + text);
        }).catch(function(){
            // fallback
            var ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            layer.msg('已复制');
        });
    };

    $('#btnAdd').on('click', function(){
        layer.prompt({title: '请输入令牌名称', formType: 0}, function(name, index){
            if(!name.trim()) { layer.msg('名称不能为空'); return; }
            $.post('/admin/api-tokens/add', {name: name.trim()}, function(res){
                if(res.code === 0){
                    layer.msg('创建成功！密钥: ' + res.api_key, {icon:1, time:5000});
                    loadData(1);
                } else {
                    layer.msg(res.msg || '创建失败');
                }
            });
            layer.close(index);
        });
    });
});
</script>
</body>
</html>
