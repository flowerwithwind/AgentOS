<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title if user else "新增用户" }}</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('lib/layui/css/layui.css') }}">
    <style>
        body { padding: 20px; background: #fff; }
        .layui-form-label { width: 80px; }
        .layui-input-block { margin-left: 110px; }
    </style>
</head>
<body>
<form class="layui-form" id="userForm">
    {% if user %}
    <input type="hidden" name="id" value="{{ user['id'] }}">
    {% end %}

    <div class="layui-form-item">
        <label class="layui-form-label">用户名</label>
        <div class="layui-input-block">
            <input type="text" name="username" required lay-verify="required"
                   placeholder="请输入用户名" autocomplete="off"
                   class="layui-input" value="{{ user['username'] if user else '' }}">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">密码</label>
        <div class="layui-input-block">
            <input type="password" name="password" placeholder="{% if user %}留空则不修改密码{% else %}请输入密码{% end %}"
                   autocomplete="off" class="layui-input"
                   {% if not user %}required lay-verify="required"{% end %}>
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">角色</label>
        <div class="layui-input-block">
            <select name="role_id">
                {% for r in roles %}
                <option value="{{ r['id'] }}" {% if user and user['role_id'] == r['id'] %}selected{% end %}>
                    {{ r['name'] }}
                </option>
                {% end %}
            </select>
        </div>
    </div>

    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="formSubmit">提交</button>
            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
        </div>
    </div>
</form>

<script src="{{ static_url('lib/layui/layui.js') }}"></script>
<script>
function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : undefined;
}
layui.$.ajaxSetup({
    beforeSend: function(xhr) { xhr.setRequestHeader('X-Xsrftoken', getCookie('_xsrf')); }
});

layui.use(['form', 'layer'], function(){
    var form = layui.form, layer = layui.layer, $ = layui.$;

    form.on('submit(formSubmit)', function(data){
        $.post(window.location.pathname, data.field, function(res){
            if(res.code === 0){
                layer.msg(res.msg, {icon: 1, time: 1000}, function(){
                    var index = parent.layer.getFrameIndex(window.name);
                    parent.layer.close(index);
                });
            } else {
                layer.msg(res.msg, {icon: 2});
            }
        });
        return false;
    });
});
</script>
</body>
</html>
