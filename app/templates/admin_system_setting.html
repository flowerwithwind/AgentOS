<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} - XHAgentOS</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('lib/layui/css/layui.css') }}">
    <style>
        body { padding: 20px; background: #f5f6fa; font-family: -apple-system, sans-serif; }
        .page-title {
            font-size: 18px; font-weight: 600; color: #1a1a2e;
            margin-bottom: 20px; padding-bottom: 12px;
            border-bottom: 2px solid #e8e8e8;
        }
        .page-title .layui-icon { font-size: 20px; margin-right: 6px; color: #5fb878; }
        .setting-card {
            background: #fff; border-radius: 6px; padding: 24px;
            margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .setting-card h3 {
            font-size: 15px; color: #1a1a2e; margin-bottom: 16px;
            padding-bottom: 10px; border-bottom: 1px solid #f0f0f0;
        }
        .setting-card h3 .layui-icon { margin-right: 6px; color: #5fb878; }
        .layui-form-label { width: 130px; }
        .layui-input-block { margin-left: 160px; }
        .layui-form-mid { color: #999; font-size: 12px; }
        .logo-preview {
            max-width: 200px; max-height: 60px;
            border: 1px solid #e8e8e8; border-radius: 4px; padding: 4px;
            margin-top: 8px; display: none;
        }
        .color-preview {
            display: inline-block; width: 24px; height: 24px;
            border-radius: 4px; vertical-align: middle; margin-right: 8px;
            border: 1px solid #ddd;
        }
        /* 日志查看器 */
        .log-toolbar { margin-bottom: 12px; }
        .log-content {
            background: #1e1e1e; color: #d4d4d4; font-family: 'Cascadia Code', 'Courier New', monospace;
            font-size: 12px; padding: 16px; border-radius: 6px;
            max-height: 500px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
            line-height: 1.6;
        }
        .log-content .log-info { color: #6bc7f5; }
        .log-content .log-warn { color: #e8c547; }
        .log-content .log-error { color: #f56c6c; }
        .log-content .log-debug { color: #888; }
        .log-empty { color: #666; text-align: center; padding: 40px; }
    </style>
</head>
<body>
<div>
    <div class="page-title">
        <i class="layui-icon layui-icon-set"></i> 系统设置
    </div>

    <form class="layui-form" id="settingForm">
        <!-- 基本设置 -->
        <div class="setting-card">
            <h3><i class="layui-icon layui-icon-home"></i> 基本设置</h3>
            <div class="layui-form-item">
                <label class="layui-form-label">站点名称</label>
                <div class="layui-input-block">
                    <input type="text" name="site_name" id="site_name"
                           class="layui-input" value="{{ settings.get('site_name', 'XHAgentOS') }}">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">站点描述</label>
                <div class="layui-input-block">
                    <textarea name="site_description" id="site_description"
                              class="layui-textarea" style="min-height:60px;">{{ settings.get('site_description', '基于AI的智能瞭望与智能问数系统') }}</textarea>
                </div>
            </div>
        </div>

        <!-- 站点样式 -->
        <div class="setting-card">
            <h3><i class="layui-icon layui-icon-skin"></i> 站点样式</h3>
            <div class="layui-form-item">
                <label class="layui-form-label">Logo</label>
                <div class="layui-input-block">
                    <button type="button" class="layui-btn layui-btn-sm" id="uploadLogoBtn">
                        <i class="layui-icon layui-icon-upload"></i> 上传 Logo
                    </button>
                    <input type="hidden" name="site_logo" id="site_logo"
                           value="{{ settings.get('site_logo', '') }}">
                    <div class="layui-form-mid layui-word-aux" style="margin-left:10px;">建议尺寸 200x60px</div>
                    <div id="logoPreview">
                        {% if settings.get('site_logo') %}
                        <img src="{{ settings.get('site_logo') }}" class="logo-preview" style="display:block;">
                        {% end %}
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">主题色</label>
                <div class="layui-input-block">
                    <input type="color" name="theme_color" id="theme_color"
                           value="{{ settings.get('theme_color', '#1a1a2e') }}"
                           style="width:50px;height:36px;border:none;cursor:pointer;vertical-align:middle;">
                    <span class="layui-form-mid" id="themeColorText" style="margin-left:8px;">{{ settings.get('theme_color', '#1a1a2e') }}</span>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">页脚信息</label>
                <div class="layui-input-block">
                    <input type="text" name="footer_text" id="footer_text"
                           class="layui-input" value="{{ settings.get('footer_text', 'XHAgentOS v1.0') }}">
                </div>
            </div>
        </div>

        <!-- AI 模型默认配置 -->
        <div class="setting-card">
            <h3><i class="layui-icon layui-icon-engine"></i> AI 模型默认配置</h3>
            <div class="layui-form-item">
                <label class="layui-form-label">默认模型</label>
                <div class="layui-input-block">
                    <select name="default_model_id" id="default_model_id" class="layui-input">
                        <option value="">系统默认模型</option>
                        {% for m in models %}
                        <option value="{{ m['id'] }}" {{ 'selected' if str(settings.get('default_model_id', '')) == str(m['id']) else '' }}>{{ m['name'] }}</option>
                        {% end %}
                    </select>
                    <div class="layui-form-mid layui-word-aux">留空则使用模型管理中标记为"默认"的模型</div>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">超时时间(秒)</label>
                <div class="layui-input-block">
                    <input type="number" name="ai_timeout" id="ai_timeout"
                           class="layui-input" value="{{ settings.get('ai_timeout', '60') }}"
                           style="width:120px;" min="10" max="300">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">最大返回 Token</label>
                <div class="layui-input-block">
                    <input type="number" name="ai_max_tokens" id="ai_max_tokens"
                           class="layui-input" value="{{ settings.get('ai_max_tokens', '2048') }}"
                           style="width:120px;" min="256" max="8192">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">温度参数</label>
                <div class="layui-input-block">
                    <input type="number" name="ai_temperature" id="ai_temperature"
                           class="layui-input" value="{{ settings.get('ai_temperature', '0.7') }}"
                           style="width:120px;" step="0.1" min="0" max="2">
                    <div class="layui-form-mid layui-word-aux">0~2，越高回答越随机</div>
                </div>
            </div>
        </div>

        <!-- 瞭望采集策略 -->
        <div class="setting-card">
            <h3><i class="layui-icon layui-icon-app"></i> 瞭望采集策略</h3>
            <div class="layui-form-item">
                <label class="layui-form-label">数据保留天数</label>
                <div class="layui-input-block">
                    <input type="number" name="lookout_retain_days" id="lookout_retain_days"
                           class="layui-input" value="{{ settings.get('lookout_retain_days', '30') }}"
                           style="width:120px;" min="1" max="365">
                    <div class="layui-form-mid layui-word-aux">超过此天数的采集记录将被自动清理</div>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">单次最大条数</label>
                <div class="layui-input-block">
                    <input type="number" name="lookout_max_per_collect" id="lookout_max_per_collect"
                           class="layui-input" value="{{ settings.get('lookout_max_per_collect', '50') }}"
                           style="width:120px;" min="10" max="200">
                    <div class="layui-form-mid layui-word-aux">单次采集每源最多获取的记录数</div>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">采集间隔(分钟)</label>
                <div class="layui-input-block">
                    <input type="number" name="lookout_interval" id="lookout_interval"
                           class="layui-input" value="{{ settings.get('lookout_interval', '60') }}"
                           style="width:120px;" min="5" max="1440">
                </div>
            </div>
        </div>

        <!-- 数据清理策略 -->
        <div class="setting-card">
            <h3><i class="layui-icon layui-icon-log"></i> 数据清理策略</h3>
            <div class="layui-form-item">
                <label class="layui-form-label">启用自动清理</label>
                <div class="layui-input-block">
                    <input type="checkbox" name="auto_clean_enabled" id="auto_clean_enabled"
                           lay-skin="switch" lay-text="开启|关闭"
                           {{ 'checked' if settings.get('auto_clean_enabled', '0') == '1' else '' }}>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">对话记录保留(天)</label>
                <div class="layui-input-block">
                    <input type="number" name="clean_conversation_days" id="clean_conversation_days"
                           class="layui-input" value="{{ settings.get('clean_conversation_days', '90') }}"
                           style="width:120px;" min="7" max="365">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">会话记录保留(天)</label>
                <div class="layui-input-block">
                    <input type="number" name="clean_session_days" id="clean_session_days"
                           class="layui-input" value="{{ settings.get('clean_session_days', '90') }}"
                           style="width:120px;" min="7" max="365">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">日志保留(天)</label>
                <div class="layui-input-block">
                    <input type="number" name="clean_log_days" id="clean_log_days"
                           class="layui-input" value="{{ settings.get('clean_log_days', '30') }}"
                           style="width:120px;" min="7" max="365">
                </div>
            </div>
        </div>

        <!-- 日志设置 -->
        <div class="setting-card">
            <h3><i class="layui-icon layui-icon-file"></i> 日志设置</h3>
            <div class="layui-form-item">
                <label class="layui-form-label">启用日志</label>
                <div class="layui-input-block">
                    <input type="checkbox" name="enable_log" id="enable_log"
                           lay-skin="switch" lay-text="开启|关闭"
                           {{ 'checked' if settings.get('enable_log', '1') == '1' else '' }}>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">日志级别</label>
                <div class="layui-input-block">
                    <select name="log_level" id="log_level" class="layui-input">
                        <option value="DEBUG" {{ 'selected' if settings.get('log_level', 'INFO') == 'DEBUG' else '' }}>DEBUG</option>
                        <option value="INFO" {{ 'selected' if settings.get('log_level', 'INFO') == 'INFO' else '' }}>INFO</option>
                        <option value="WARNING" {{ 'selected' if settings.get('log_level', 'INFO') == 'WARNING' else '' }}>WARNING</option>
                        <option value="ERROR" {{ 'selected' if settings.get('log_level', 'INFO') == 'ERROR' else '' }}>ERROR</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="setting-card" style="text-align:center;">
            <button class="layui-btn" lay-submit lay-filter="saveBtn">
                <i class="layui-icon layui-icon-ok"></i> 保存设置
            </button>
        </div>
    </form>

    <!-- 日志查看器 -->
    <div class="setting-card">
        <h3><i class="layui-icon layui-icon-log"></i> 运行日志</h3>
        <div class="log-toolbar">
            <div class="layui-inline">
                <select id="logLevelFilter" class="layui-input" style="height:32px;line-height:32px;padding:0 8px;">
                    <option value="">所有级别</option>
                    <option value="INFO">INFO</option>
                    <option value="WARNING">WARNING</option>
                    <option value="ERROR">ERROR</option>
                    <option value="DEBUG">DEBUG</option>
                </select>
            </div>
            <div class="layui-inline">
                <input type="text" id="logKeyword" placeholder="搜索关键词"
                       class="layui-input" style="height:32px;line-height:32px;width:160px;">
            </div>
            <div class="layui-inline">
                <button class="layui-btn layui-btn-sm" id="refreshLogBtn">
                    <i class="layui-icon layui-icon-refresh"></i> 刷新
                </button>
                <button class="layui-btn layui-btn-sm layui-btn-danger" id="clearLogBtn">
                    <i class="layui-icon layui-icon-delete"></i> 清空日志
                </button>
            </div>
        </div>
        <div class="log-content" id="logContent">
            <div class="log-empty">加载中...</div>
        </div>
    </div>
</div>

<script src="{{ static_url('lib/layui/layui.js') }}"></script>
<script>
function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : undefined;
}

layui.use(['form', 'layer', 'upload'], function(){
    var form = layui.form, layer = layui.layer, $ = layui.$, upload = layui.upload;

    $.ajaxSetup({
        beforeSend: function(xhr) { xhr.setRequestHeader('X-Xsrftoken', getCookie('_xsrf')); }
    });

    // 主题色实时预览
    $('#theme_color').on('input', function(){
        $('#themeColorText').text(this.value);
    });

    // Logo 上传
    upload.render({
        elem: '#uploadLogoBtn',
        url: '/admin/settings/logo',
        accept: 'images',
        size: 512, // 512KB
        done: function(res){
            if (res.code === 0) {
                $('#site_logo').val(res.url);
                $('#logoPreview').html('<img src="'+res.url+'" class="logo-preview" style="display:block;">');
                layer.msg('上传成功', {icon: 1});
            } else {
                layer.msg(res.msg || '上传失败', {icon: 2});
            }
        }
    });

    // 保存设置
    form.on('submit(saveBtn)', function(data){
        var params = {
            site_name: $('#site_name').val(),
            site_description: $('#site_description').val(),
            site_logo: $('#site_logo').val(),
            theme_color: $('#theme_color').val(),
            footer_text: $('#footer_text').val(),
            default_model_id: $('#default_model_id').val(),
            ai_timeout: $('#ai_timeout').val(),
            ai_max_tokens: $('#ai_max_tokens').val(),
            ai_temperature: $('#ai_temperature').val(),
            lookout_retain_days: $('#lookout_retain_days').val(),
            lookout_max_per_collect: $('#lookout_max_per_collect').val(),
            lookout_interval: $('#lookout_interval').val(),
            auto_clean_enabled: $('#auto_clean_enabled').is(':checked') ? '1' : '0',
            clean_conversation_days: $('#clean_conversation_days').val(),
            clean_session_days: $('#clean_session_days').val(),
            clean_log_days: $('#clean_log_days').val(),
            enable_log: $('#enable_log').is(':checked') ? '1' : '0',
            log_level: $('#log_level').val()
        };
        $.post('/admin/settings/api', params, function(res){
            if (res.code === 0) {
                layer.msg('保存成功', {icon: 1, time: 1500});
            } else {
                layer.msg(res.msg || '保存失败', {icon: 2});
            }
        });
        return false;
    });

    // ====== 日志查看器 ======
    function loadLogs() {
        var level = $('#logLevelFilter').val();
        var keyword = $('#logKeyword').val();
        $.get('/admin/settings/logs/api', {level: level, keyword: keyword}, function(res){
            if (res.code === 0) {
                var html = '';
                if (res.data && res.data.length > 0) {
                    res.data.forEach(function(line){
                        var cls = 'log-info';
                        if (line.indexOf('WARNING') >= 0 || line.indexOf('WARN') >= 0) cls = 'log-warn';
                        else if (line.indexOf('ERROR') >= 0) cls = 'log-error';
                        else if (line.indexOf('DEBUG') >= 0) cls = 'log-debug';
                        html += '<div class="'+cls+'">'+escapeHtml(line)+'</div>';
                    });
                } else {
                    html = '<div class="log-empty">暂无日志</div>';
                }
                $('#logContent').html(html);
                $('#logContent').scrollTop($('#logContent')[0].scrollHeight);
            }
        });
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    $('#refreshLogBtn').on('click', loadLogs);
    $('#logLevelFilter').on('change', loadLogs);
    $('#logKeyword').on('keydown', function(e){
        if (e.key === 'Enter') loadLogs();
    });

    // 清空日志
    $('#clearLogBtn').on('click', function(){
        layer.confirm('确定清空所有日志？', function(index){
            $.post('/admin/settings/logs/clear', {}, function(res){
                if (res.code === 0) {
                    layer.msg('已清空', {icon: 1});
                    loadLogs();
                }
                layer.close(index);
            });
        });
    });

    // 初始加载日志
    loadLogs();

    // 接收来自父窗口的主题色
    window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'xha_theme') {
            document.documentElement.style.setProperty('--theme-color', e.data.theme_color);
        }
    });
    // 尝试从 localStorage 读取主题色
    var savedColor = localStorage.getItem('xha_theme_color');
    if (savedColor) {
        document.documentElement.style.setProperty('--theme-color', savedColor);
    }
});
</script>
</body>
</html>
