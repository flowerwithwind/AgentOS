<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - XHAgentOS</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('lib/layui/css/layui.css') }}">
    <style>
        body { padding: 15px; background: #f5f6fa; }
        .page-title {
            font-size: 18px; font-weight: 600; color: #1a1a2e;
            margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #e8e8e8;
        }
        .page-title .layui-icon { font-size: 20px; margin-right: 6px; color: #1e9fff; }

        .toolbar { margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .batch-area { display: none; gap: 8px; align-items: center; }
        .batch-area.show { display: flex; }

        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }
        @media (max-width: 1100px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 700px) { .card-grid { grid-template-columns: 1fr; } }

        .model-card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            padding: 16px;
            position: relative;
            transition: all 0.3s;
        }
        .model-card:hover {
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border-color: #d2d2d2;
        }
        .model-card.disabled { opacity: 0.6; border-color: #ffb4b4; }

        .card-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px;
        }
        .card-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 2px;
            font-size: 12px; font-weight: 500;
        }
        .badge-default { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .badge-enabled { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }
        .badge-disabled { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }

        .card-name {
            font-size: 16px; font-weight: 600; color: #333;
            margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
        }
        .card-name .provider-tag {
            font-size: 11px; font-weight: 400;
            padding: 1px 6px; border-radius: 2px;
            background: #f0f0f0; color: #666; border: 1px solid #e0e0e0;
        }
        .card-model-name {
            font-size: 12px; color: #999;
            margin-bottom: 12px;
            font-family: 'Courier New', monospace;
        }

        .card-info {
            display: flex; flex-direction: column; gap: 6px;
            margin-bottom: 12px; padding: 10px; border-radius: 2px;
            background: #fafafa;
            border: 1px solid #f0f0f0;
        }
        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px;
        }
        .info-row .label { color: #999; }
        .info-row .value { color: #555; font-family: 'Courier New', monospace; }
        .info-row .value.url-text { font-size: 11px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .token-stats {
            margin-bottom: 12px; padding: 10px; border-radius: 2px;
            background: #fafafa;
            border: 1px solid #f0f0f0;
        }
        .token-stats .stat-header {
            display: flex; justify-content: space-between; font-size: 12px;
            margin-bottom: 6px; color: #666;
        }
        .token-bar {
            height: 6px; border-radius: 3px;
            background: #e8e8e8;
            overflow: hidden;
        }
        .token-bar .fill {
            height: 100%; border-radius: 3px;
            background: #1e9fff;
            transition: width 0.6s;
        }

        .card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .card-actions .layui-btn-sm { flex: 1; justify-content: center; min-width: 56px; }

        /* 分页 */
        .pagination-wrap {
            display: flex; justify-content: center; gap: 4px;
            padding: 12px 0;
        }
        .pagination-wrap .page-btn {
            padding: 6px 12px; border-radius: 2px;
            border: 1px solid #e2e2e2;
            background: #fff;
            color: #555; cursor: pointer;
            font-size: 13px; transition: all 0.2s;
        }
        .pagination-wrap .page-btn:hover {
            border-color: #1e9fff;
            color: #1e9fff;
        }
        .pagination-wrap .page-btn.active {
            border-color: #1e9fff;
            background: #1e9fff;
            color: #fff;
        }
        .pagination-wrap .page-btn:disabled {
            opacity: 0.4; cursor: not-allowed; color: #bbb; border-color: #e2e2e2;
        }
        .pagination-wrap .page-info {
            display: flex; align-items: center;
            font-size: 13px; color: #999;
            padding: 0 8px;
        }

        /* 弹窗表单 */
        .dialog-form { padding: 20px; }
        .dialog-form .field { margin-bottom: 15px; }
        .dialog-form .field label {
            display: block; font-size: 13px; color: #666;
            margin-bottom: 6px; font-weight: 500;
        }
        .dialog-form .field input, .dialog-form .field select {
            width: 100%; padding: 8px 10px; border-radius: 2px;
            border: 1px solid #e6e6e6;
            background: #fff;
            color: #333; font-size: 14px; outline: none;
            transition: border-color 0.3s;
        }
        .dialog-form .field input:focus, .dialog-form .field select:focus {
            border-color: #1e9fff;
        }
        .dialog-form .field input::placeholder { color: #ccc; }

        /* 对话测试弹窗 */
        .chat-box {
            padding: 16px; height: 400px; display: flex; flex-direction: column;
            background: #fff;
        }
        .chat-messages {
            flex: 1; overflow-y: auto; margin-bottom: 12px;
            display: flex; flex-direction: column; gap: 10px;
            padding-right: 4px;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
        .chat-msg {
            padding: 10px 14px; border-radius: 4px;
            max-width: 85%; line-height: 1.6;
            font-size: 14px; word-break: break-word;
        }
        .chat-msg.user {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            align-self: flex-end;
            color: #1565c0;
        }
        .chat-msg.ai {
            background: #f5f5f5;
            border: 1px solid #e8e8e8;
            align-self: flex-start;
            color: #555;
        }
        .chat-msg.ai .loading-dots { display: inline-flex; gap: 4px; }
        .chat-msg.ai .loading-dots span {
            width: 6px; height: 6px; border-radius: 50%;
            background: #1e9fff; animation: dotPulse 1.4s infinite;
        }
        .chat-msg.ai .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .chat-msg.ai .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }
        .chat-input-row { display: flex; gap: 8px; }
        .chat-input-row input {
            flex: 1; padding: 8px 10px; border-radius: 2px;
            border: 1px solid #e6e6e6;
            background: #fff;
            color: #333; font-size: 14px; outline: none;
        }
        .chat-input-row input:focus { border-color: #1e9fff; }

        .empty-state {
            text-align: center; padding: 60px 20px;
            color: #bbb;
            font-size: 14px;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
<div>
    <div class="page-title"><i class="layui-icon layui-icon-engine"></i> 模型引擎</div>

    <div class="toolbar">
        <div class="batch-area" id="batchArea">
            <span style="font-size:13px; color:#666;">已选 <strong id="selectedCount" style="color:#1e9fff;">0</strong> 个</span>
            <button class="layui-btn layui-btn-sm layui-btn-normal" onclick="batchAction('enable')">启用</button>
            <button class="layui-btn layui-btn-sm layui-btn-warm" onclick="batchAction('disable')">禁用</button>
            <button class="layui-btn layui-btn-sm layui-btn-danger" onclick="batchAction('delete')">删除</button>
        </div>
        <button class="layui-btn layui-btn-sm" onclick="openCreate()">
            <i class="layui-icon layui-icon-add-1"></i> 新增模型
        </button>
    </div>

    <!-- 卡片网格 -->
    <div id="cardGrid" class="card-grid"></div>

    <!-- 分页 -->
    <div class="pagination-wrap" id="pagination"></div>
</div>

<script src="{{ static_url('lib/layui/layui.js') }}"></script>
<script>
function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : undefined;
}

var $ = layui.$;
layui.$.ajaxSetup({
    beforeSend: function(xhr) { xhr.setRequestHeader('X-Xsrftoken', getCookie('_xsrf')); }
});

var currentPage = 1;
var totalCount = 0;
var pageSize = 6;
var selected = {};

function showToast(msg, type) {
    layer.msg(msg, {icon: type==='success'?1:2});
}

function loadModels(page) {
    page = page || 1;
    $.get('/admin/models/api?page='+page+'&limit='+pageSize, function(res){
        if(res.code !== 0) return;
        totalCount = res.count;
        currentPage = page;
        selected = {};
        updateBatchArea();
        renderCards(res.data);
        renderPagination();
    });
}

function renderCards(data) {
    var html = '';
    if(!data || data.length === 0){
        html = '<div class="empty-state" style="grid-column:1/-1;"><div class="icon">&#128302;</div>暂无模型，点击右上角「新增模型」添加</div>';
        $('#cardGrid').html(html);
        return;
    }
    data.forEach(function(m){
        var statusBadge, statusClass = '';
        if(m.is_default){
            statusBadge = '<span class="card-badge badge-default">&#9733; 默认</span>';
        } else if(m.status){
            statusBadge = '<span class="card-badge badge-enabled">&#9679; 启用</span>';
        } else {
            statusBadge = '<span class="card-badge badge-disabled">&#9675; 禁用</span>';
            statusClass = ' disabled';
        }
        var tokenDisplay = m.total_tokens;
        var tokenPercent = Math.min(100, (m.total_tokens / 100000) * 100);
        var tokenLabel = tokenDisplay >= 1000 ? (tokenDisplay/1000).toFixed(1)+'K' : tokenDisplay;

        html += '<div class="model-card'+statusClass+'" data-id="'+m.id+'">';
        html += '<div class="card-top">';
        html += '<div>'+statusBadge+'</div>';
        html += '<input type="checkbox" class="card-checkbox" value="'+m.id+'" onchange="toggleSelect(this)">';
        html += '</div>';
        html += '<div class="card-name">'+m.name+' <span class="provider-tag">'+m.provider+'</span></div>';
        html += '<div class="card-model-name">'+m.model_name+'</div>';
        html += '<div class="card-info">';
        html += '<div class="info-row"><span class="label">接口地址</span><span class="value url-text" title="'+m.base_url+'">'+m.base_url+'</span></div>';
        html += '<div class="info-row"><span class="label">API密钥</span><span class="value">'+(m.api_key||'未配置')+'</span></div>';
        html += '<div class="info-row"><span class="label">调用次数</span><span class="value">'+m.total_calls+'</span></div>';
        html += '</div>';
        html += '<div class="token-stats">';
        html += '<div class="stat-header"><span>Token 消耗</span><span>'+tokenLabel+'</span></div>';
        html += '<div class="token-bar"><div class="fill" style="width:'+tokenPercent+'%"></div></div>';
        html += '</div>';
        html += '<div class="card-actions">';
        if(!m.is_default){
            html += '<button class="layui-btn layui-btn-sm layui-btn-normal" onclick="setDefault('+m.id+')">设为默认</button>';
        }
        if(!m.is_default){
            if(m.status){
                html += '<button class="layui-btn layui-btn-sm layui-btn-warm" onclick="toggleStatus('+m.id+',0)">禁用</button>';
            } else {
                html += '<button class="layui-btn layui-btn-sm layui-btn-normal" onclick="toggleStatus('+m.id+',1)">启用</button>';
            }
        }
        html += '<button class="layui-btn layui-btn-sm" onclick="openEdit('+m.id+')">编辑</button>';
        html += '<button class="layui-btn layui-btn-sm layui-btn-danger" onclick="openDelete('+m.id+')">删除</button>';
        html += '<button class="layui-btn layui-btn-sm" onclick="openTrend('+m.id+')">趋势</button>';
        html += '<button class="layui-btn layui-btn-sm" onclick="openChat('+m.id+',\''+m.name+'\')">对话测试</button>';
        html += '</div>';
        html += '</div>';
    });
    $('#cardGrid').html(html);
}

function renderPagination() {
    var totalPages = Math.ceil(totalCount / pageSize);
    if(totalPages <= 1) { $('#pagination').empty(); return; }
    var html = '';
    html += '<button class="page-btn" onclick="loadModels(1)" '+(currentPage<=1?'disabled':'')+'>&laquo;</button>';
    html += '<button class="page-btn" onclick="loadModels('+(currentPage-1)+')" '+(currentPage<=1?'disabled':'')+'>&lsaquo;</button>';
    var start = Math.max(1, currentPage-2);
    var end = Math.min(totalPages, currentPage+2);
    for(var i=start; i<=end; i++){
        html += '<button class="page-btn'+(i===currentPage?' active':'')+'" onclick="loadModels('+i+')">'+i+'</button>';
    }
    html += '<button class="page-btn" onclick="loadModels('+(currentPage+1)+')" '+(currentPage>=totalPages?'disabled':'')+'>&rsaquo;</button>';
    html += '<button class="page-btn" onclick="loadModels('+totalPages+')" '+(currentPage>=totalPages?'disabled':'')+'>&raquo;</button>';
    html += '<span class="page-info">共 '+totalCount+' 条</span>';
    $('#pagination').html(html);
}

function toggleSelect(el) {
    var id = parseInt(el.value);
    if(el.checked) selected[id] = true;
    else delete selected[id];
    updateBatchArea();
}
function updateBatchArea() {
    var cnt = Object.keys(selected).length;
    $('#selectedCount').text(cnt);
    if(cnt > 0) $('#batchArea').addClass('show');
    else $('#batchArea').removeClass('show');
}
function getSelectedIds() { return Object.keys(selected).join(','); }

function batchAction(action) {
    var ids = getSelectedIds();
    if(!ids) { showToast('请先选择模型', 'error'); return; }
    var msgMap = {delete:'确定批量删除所选模型？', enable:'确定批量启用所选模型？', disable:'确定批量禁用所选模型？'};
    layer.confirm(msgMap[action] || '确定执行？', {icon: 3, title: '提示'}, function(index){
        $.post('/admin/models/batch', {action:action, ids:ids}, function(res){
            showToast(res.msg, res.code===0?'success':'error');
            if(res.code===0) loadModels(currentPage);
        });
        layer.close(index);
    });
}

function openCreate() {
    layer.open({
        type: 1, title: '新增模型', area: ['500px', '480px'],
        content: '<div class="dialog-form">'+
            '<div class="field"><label>模型名称</label><input id="f_name" placeholder="如 DeepSeek V4"></div>'+
            '<div class="field"><label>提供商</label><select id="f_provider"><option value="openai">OpenAI</option></select></div>'+
            '<div class="field"><label>API 密钥</label><input id="f_api_key" placeholder="sk-..." type="password"></div>'+
            '<div class="field"><label>接口地址</label><input id="f_base_url" value="https://api.deepseek.com/v1" placeholder="https://api.deepseek.com/v1"></div>'+
            '<div class="field"><label>模型名</label><input id="f_model_name" placeholder="如 deepseek-v4-flash"></div>'+
            '<button class="layui-btn layui-btn-fluid" style="margin-top:8px;" onclick="submitCreate()">创建</button>'+
            '</div>',
        shadeClose: true
    });
}
function submitCreate() {
    var data = {
        name: $('#f_name').val(),
        provider: $('#f_provider').val(),
        api_key: $('#f_api_key').val(),
        base_url: $('#f_base_url').val(),
        model_name: $('#f_model_name').val()
    };
    if(!data.name || !data.api_key || !data.model_name){
        showToast('请填写完整信息', 'error'); return;
    }
    $.post('/admin/models/add', data, function(res){
        if(res.code===0){ showToast('创建成功', 'success'); layer.closeAll(); loadModels(1); }
        else showToast(res.msg, 'error');
    });
}

function openEdit(id) {
    $.get('/admin/models/api?limit=100', function(res){
        var model = null;
        if(res.data) res.data.forEach(function(m){ if(m.id===id) model=m; });
        if(!model) return;
        layer.open({
            type: 1, title: '编辑模型', area: ['500px', '480px'],
            content: '<div class="dialog-form">'+
                '<div class="field"><label>模型名称</label><input id="e_name" value="'+model.name+'"></div>'+
                '<div class="field"><label>提供商</label><select id="e_provider"><option value="openai" '+(model.provider==='openai'?'selected':'')+'>OpenAI</option></select></div>'+
                '<div class="field"><label>API 密钥</label><input id="e_api_key" value="'+model.api_key+'" type="password"></div>'+
                '<div class="field"><label>接口地址</label><input id="e_base_url" value="'+model.base_url+'"></div>'+
                '<div class="field"><label>模型名</label><input id="e_model_name" value="'+model.model_name+'"></div>'+
                '<button class="layui-btn layui-btn-fluid" style="margin-top:8px;" onclick="submitEdit('+id+')">保存</button>'+
                '</div>',
            shadeClose: true
        });
    });
}
function submitEdit(id) {
    $.post('/admin/models/edit', {
        id: id,
        name: $('#e_name').val(),
        provider: $('#e_provider').val(),
        api_key: $('#e_api_key').val(),
        base_url: $('#e_base_url').val(),
        model_name: $('#e_model_name').val()
    }, function(res){
        if(res.code===0){ showToast('更新成功', 'success'); layer.closeAll(); loadModels(currentPage); }
        else showToast(res.msg, 'error');
    });
}

function openDelete(id) {
    layer.confirm('确定删除此模型？', {icon: 3, title: '提示'}, function(index){
        $.ajax({
            type: 'POST',
            url: '/admin/models/delete',
            data: {id: id},
            dataType: 'json',
            beforeSend: function(xhr) {
                xhr.setRequestHeader('X-Xsrftoken', getCookie('_xsrf'));
            },
            success: function(res) {
                showToast(res.msg, res.code===0?'success':'error');
                if(res.code===0) {
                    if(totalCount > 0 && Math.ceil((totalCount-1) / pageSize) < currentPage) {
                        currentPage = Math.max(1, currentPage - 1);
                    }
                    loadModels(currentPage);
                }
            },
            error: function(xhr) {
                showToast('删除失败 (状态:' + xhr.status + ')', 'error');
            }
        });
        layer.close(index);
    });
}

function setDefault(id) {
    $.post('/admin/models/default', {id:id}, function(res){
        showToast(res.msg, res.code===0?'success':'error');
        if(res.code===0) loadModels(currentPage);
    });
}

function toggleStatus(id, status) {
    $.post('/admin/models/batch', {action: status?'enable':'disable', ids:id+''}, function(res){
        showToast(res.msg, res.code===0?'success':'error');
        if(res.code===0) loadModels(currentPage);
    });
}

var chatModelId = 0;

function openTrend(modelId) {
    layer.open({
        type: 1, title: 'Token 消耗趋势（近30天）', area: ['700px', '480px'],
        content: '<div style="padding:16px;text-align:center;background:#fff;"><canvas id="trendCanvas" width="640" height="360"></canvas><p style="color:#999;font-size:12px;margin-top:8px;">暂无数据</p></div>',
        shadeClose: true,
        success: function() {
            $.get('/admin/models/trend?id='+modelId, function(res){
                if(res.code===0 && res.data && res.data.length>0) {
                    drawTrendChart(res.data);
                }
            });
        }
    });
}

function drawTrendChart(data) {
    var canvas = document.getElementById('trendCanvas');
    if(!canvas) return;
    var ctx = canvas.getContext('2d');
    var W = canvas.width, H = canvas.height;
    var pad = {top:30, right:30, bottom:50, left:50};
    var chartW = W - pad.left - pad.right;
    var chartH = H - pad.top - pad.bottom;

    var dates = data.map(function(d){ return d.date.slice(5); });
    var tokens = data.map(function(d){ return d.tokens; });
    var maxVal = Math.max.apply(null, tokens) || 1;

    ctx.clearRect(0, 0, W, H);

    ctx.strokeStyle = '#eee';
    ctx.lineWidth = 1;
    for(var i=0;i<=5;i++) {
        var y = pad.top + chartH * (1 - i/5);
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(W - pad.right, y);
        ctx.stroke();
        ctx.fillStyle = '#666';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(Math.round(maxVal * i / 5), pad.left-8, y+4);
    }

    var step = Math.max(1, Math.floor(dates.length / 10));
    ctx.textAlign = 'center';
    for(var i=0;i<dates.length;i++) {
        if(i % step === 0 || i === dates.length-1) {
            var x = pad.left + chartW * i / (dates.length-1 || 1);
            ctx.fillStyle = '#666';
            ctx.font = '11px sans-serif';
            ctx.fillText(dates[i], x, H - pad.bottom + 20);
        }
    }

    ctx.beginPath();
    ctx.strokeStyle = '#1e9fff';
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    for(var i=0;i<tokens.length;i++) {
        var x = pad.left + chartW * i / (tokens.length-1 || 1);
        var y = pad.top + chartH * (1 - tokens[i] / maxVal);
        if(i===0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();

    var lastX = pad.left + chartW * (tokens.length-1) / (tokens.length-1 || 1);
    ctx.lineTo(lastX, pad.top + chartH);
    ctx.lineTo(pad.left, pad.top + chartH);
    ctx.closePath();
    var grad = ctx.createLinearGradient(0, pad.top, 0, pad.top+chartH);
    grad.addColorStop(0, 'rgba(30,159,255,0.2)');
    grad.addColorStop(1, 'rgba(30,159,255,0.02)');
    ctx.fillStyle = grad;
    ctx.fill();

    for(var i=0;i<tokens.length;i++) {
        var x = pad.left + chartW * i / (tokens.length-1 || 1);
        var y = pad.top + chartH * (1 - tokens[i] / maxVal);
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI*2);
        ctx.fillStyle = '#1e9fff';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    ctx.fillStyle = '#666';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Token 消耗量', W/2, 18);

    var p = canvas.parentNode.querySelector('p');
    if(p) p.style.display = 'none';
}

function openChat(id, name) {
    chatModelId = id;
    layer.open({
        type: 1, title: '对话测试 - '+name, area: ['520px', '480px'],
        content: '<div class="chat-box">'+
            '<div class="chat-messages" id="chatMsgs">'+
            '<div class="chat-msg ai">你好！请输入消息开始对话测试</div>'+
            '</div>'+
            '<div class="chat-input-row">'+
            '<input id="chatInput" placeholder="输入消息..." onkeydown="if(event.key===\'Enter\')sendChat()">'+
            '<button class="layui-btn layui-btn-sm" onclick="sendChat()">发送</button>'+
            '</div></div>',
        shadeClose: true
    });
}
function sendChat() {
    var input = $('#chatInput');
    var msg = input.val().trim();
    if(!msg) return;
    var box = $('#chatMsgs');
    box.append('<div class="chat-msg user">'+escapeHtml(msg)+'</div>');
    input.val('');
    box.append('<div class="chat-msg ai" id="loadingMsg"><div class="loading-dots"><span></span><span></span><span></span></div></div>');
    box.scrollTop(box[0].scrollHeight);

    $.post('/admin/models/chat', {model_id: chatModelId, message: msg}, function(res){
        $('#loadingMsg').remove();
        if(res.code===0){
            box.append('<div class="chat-msg ai">'+escapeHtml(res.reply)+'</div>');
            loadModels(currentPage);
        } else {
            box.append('<div class="chat-msg ai" style="color:#c62828;">请求失败：'+escapeHtml(res.msg)+'</div>');
        }
        box.scrollTop(box[0].scrollHeight);
    });
}
function escapeHtml(s) {
    if(!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

loadModels(1);
</script>
