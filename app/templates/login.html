<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - XHAgentOS</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('css/login.css') }}">
</head>
<body>
    <div class="login-wrapper">
        <!-- 左侧品牌区 -->
        <div class="login-brand">
            <div class="logo-icon">XH</div>
            <h1>XHAgentOS</h1>
            <p>智能数据瞭望与问数系统<br>AI 驱动的企业级数据分析平台</p>
        </div>

        <!-- 右侧登录卡片 -->
        <div class="login-card-wrapper">
            <div class="login-card">
                <div class="card-title">管理员登录</div>
                <div class="card-subtitle">请使用管理员账号登录系统</div>

                {% if error %}
                <div class="error-msg show">{{ error }}</div>
                {% else %}
                <div class="error-msg" id="errorMsg"></div>
                {% end %}

                <form method="post" action="/auth/login" id="loginForm">
                    {% module xsrf_form_html() %}
                    <div class="form-group">
                        <label>用户名</label>
                        <div class="input-wrapper">
                            <input type="text" name="username" placeholder="请输入用户名" autocomplete="username" required>
                            <span class="input-icon">&#128100;</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <div class="input-wrapper">
                            <input type="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
                            <span class="input-icon">&#128274;</span>
                        </div>
                    </div>
                    <button type="submit" class="login-btn">登 录</button>
                </form>

                <div class="login-footer">
                    &copy; 2026 XHAgentOS &mdash; All Rights Reserved
                </div>
            </div>
        </div>
    </div>
</body>
</html>
