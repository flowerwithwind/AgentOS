<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - XHAgentOS</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('lib/layui/css/layui.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 15px;
            background: #f5f6fa;
            color: #333;
            height: 100vh;
            overflow: hidden;
        }
        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8e8e8;
        }
        .page-title .layui-icon {
            font-size: 20px;
            margin-right: 6px;
            color: #1e9fff;
        }

        .layout { display: flex; height: calc(100vh - 80px); position: relative; z-index: 1; }
        .sidebar {
            width: 260px;
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            margin-right: 12px;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e8e8e8;
        }
        .sidebar-header h2 {
            font-size: 16px;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        .conv-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .conv-item {
            padding: 10px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 4px;
            font-size: 13px;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .conv-item:hover, .conv-item.active {
            background: #f0f9ff;
            color: #1e9fff;
        }
        .conv-item .del-btn {
            opacity: 0;
            background: none;
            border: none;
            color: #ff5722;
            cursor: pointer;
            font-size: 12px;
        }
        .conv-item:hover .del-btn { opacity: 1; }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid #e8e8e8;
            background: #fafafa;
        }
        .model-select {
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid #e8e8e8;
            background: #fff;
            color: #333;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }
        .model-select:focus { border-color: #1e9fff; }
        .mode-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        .mode-indicator.chat {
            background: rgba(30, 159, 255, 0.1);
            color: #1e9fff;
            border: 1px solid rgba(30, 159, 255, 0.3);
        }
        .mode-indicator.query {
            background: rgba(255, 87, 34, 0.1);
            color: #ff5722;
            border: 1px solid rgba(255, 87, 34, 0.3);
        }
        .topbar-actions { display: flex; gap: 10px; align-items: center; }
        .topbar-actions a, .topbar-actions button {
            font-size: 13px;
            color: #666;
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            text-decoration: none;
        }
        .topbar-actions button:hover, .topbar-actions a:hover {
            color: #1e9fff;
            border-color: #1e9fff;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #fff;
        }
        .welcome-box {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .welcome-box h3 {
            font-size: 22px;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        .msg-row { display: flex; margin-bottom: 16px; }
        .msg-row.user { justify-content: flex-end; }
        .msg-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg-row.user .msg-bubble {
            background: #e6f7ff;
            color: #333;
            border: 1px solid #bae7ff;
            border-bottom-right-radius: 4px;
        }
        .msg-row.assistant .msg-bubble {
            background: #f5f5f5;
            border: 1px solid #e8e8e8;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            padding: 16px 20px 20px;
            border-top: 1px solid #e8e8e8;
            background: #fafafa;
            position: relative;
        }
        .employee-tag {
            display: none;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #1e9fff;
        }
        .employee-tag.show { display: flex; }
        .input-row { display: flex; gap: 10px; }
        #msgInput {
            flex: 1;
            padding: 12px 16px;
            border-radius: 4px;
            border: 1px solid #e8e8e8;
            background: #fff;
            color: #333;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 120px;
        }
        #msgInput:focus { outline: none; border-color: #1e9fff; }
        #sendBtn {
            padding: 0 24px;
            border-radius: 4px;
            border: none;
            background: #1e9fff;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        #sendBtn:hover { background: #167bce; }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        .at-popup {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 20px;
            right: 20px;
            max-height: 200px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            margin-bottom: 8px;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .at-popup.show { display: block; }
        .at-item {
            padding: 10px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        .at-item:hover { background: #f0f9ff; }
        .at-avatar { font-size: 20px; }
        .typing { color: #999; font-size: 13px; padding: 8px 0; }
    </style>
</head>
<body>
<div class="page-title"><i class="layui-icon layui-icon-dialogue"></i> 智能问数</div>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>会话列表</h2>
            <button class="layui-btn layui-btn-sm" id="newChatBtn" style="width:100%;"><i class="layui-icon layui-icon-add-1"></i> 新建对话</button>
        </div>
        <div class="conv-list" id="convList"></div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div style="display: flex; gap: 12px; align-items: center;">
                <div class="mode-indicator chat" id="modeIndicator" style="cursor:pointer;" onclick="toggleMode()">
                    <span>💬</span>
                    <span>对话模式</span>
                </div>
                <button id="modeToggleBtn" class="layui-btn layui-btn-sm" onclick="toggleMode()">切换为问数</button>
                <select class="model-select" id="modelSelect">
                    <option value="">选择模型</option>
                </select>
            </div>
            <div class="topbar-actions">
                <span style="font-size:13px;color:#999;">{{ username }}</span>
                <button id="exportPdfBtn" disabled>导出 PDF</button>
                <a href="/admin">管理后台</a>
                <a href="/auth/logout">退出</a>
            </div>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="input-area">
            <div class="at-popup" id="atPopup"></div>
            <div class="employee-tag" id="employeeTag">
                <span id="employeeLabel"></span>
                <button type="button" id="clearEmployeeBtn" style="background:none;border:none;color:#ff5722;cursor:pointer;">×</button>
            </div>
            <div class="input-row">
                <textarea id="msgInput" rows="1" placeholder="输入消息，@ 可唤起数字员工..."></textarea>
                <button id="sendBtn">发送</button>
            </div>
        </div>
    </main>
</div>

<script src="{{ static_url('lib/layui/layui.js') }}"></script>
<script>
function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : undefined;
}

var currentSessionId = null;
var currentEmployee = null;
var employees = [];
var models = [];
var currentModelId = null;
var currentMode = 'chat'; // 'chat' | 'query'
var sending = false;

function apiGet(url) {
    return fetch(url, {
        headers: { 'X-Xsrftoken': getCookie('_xsrf') }
    }).then(function(r) { return r.json(); });
}

function apiPost(data) {
    return fetch('/user/chat/api', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-Xsrftoken': getCookie('_xsrf')
        },
        body: JSON.stringify(data)
    }).then(function(r) { return r.json(); });
}

function showWelcomeBox() {
    var area = document.getElementById('chatArea');
    area.innerHTML = '<div class="welcome-box" id="welcomeBox">' +
        '<h3>欢迎使用 XHAgentOS 智能问数</h3>' +
        '<p>点击「切换为问数」按钮进入问数模式，输入 @ 可调用数字员工</p></div>';
}

function appendMessage(role, content) {
    var welcome = document.getElementById('welcomeBox');
    if (welcome) welcome.remove();
    var area = document.getElementById('chatArea');
    var row = document.createElement('div');
    row.className = 'msg-row ' + role;
    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = content;
    row.appendChild(bubble);
    area.appendChild(row);
    area.scrollTop = area.scrollHeight;
}

function loadConvList() {
    apiGet('/user/chat/api?action=list').then(function(res) {
        if (res.code !== 0) return;
        var list = document.getElementById('convList');
        list.innerHTML = '';
        (res.data || []).forEach(function(c) {
            var item = document.createElement('div');
            item.className = 'conv-item' + (c.id === currentSessionId ? ' active' : '');
            item.dataset.id = c.id;
            var title = document.createElement('span');
            title.textContent = c.title || '新会话';
            var del = document.createElement('button');
            del.className = 'del-btn';
            del.textContent = '删除';
            del.onclick = function(e) {
                e.stopPropagation();
                deleteConv(c.id);
            };
            item.appendChild(title);
            item.appendChild(del);
            item.onclick = function() { loadSession(c.id); };
            list.appendChild(item);
        });
    });
}

function loadSession(id) {
    currentSessionId = id;
    document.getElementById('exportPdfBtn').disabled = false;
    apiGet('/user/chat/api?action=load&id=' + id).then(function(res) {
        if (res.code !== 0) return;
        var conv = res.data.conversation;
        if (conv.employee_id) {
            var emp = employees.find(function(e) { return e.id === conv.employee_id; });
            if (emp) setEmployee(emp);
            else clearEmployee();
        } else {
            clearEmployee();
        }
        var area = document.getElementById('chatArea');
        area.innerHTML = '';
        (res.data.messages || []).forEach(function(m) {
            if (m.role === 'user' || m.role === 'assistant') {
                appendMessage(m.role, m.content);
            }
        });
        if (!res.data.messages || res.data.messages.length === 0) {
            showWelcomeBox();
        }
        loadConvList();
        updateModeIndicator(false);
    });
}

function newChat() {
    currentSessionId = null;
    clearEmployee();
    document.getElementById('exportPdfBtn').disabled = true;
    showWelcomeBox();
    document.querySelectorAll('.conv-item').forEach(function(el) {
        el.classList.remove('active');
    });
    updateModeIndicator(false);
}

function loadModels() {
    apiGet('/user/chat/api?action=models').then(function(res) {
        if (res.code === 0) {
            models = res.data || [];
            var select = document.getElementById('modelSelect');
            select.innerHTML = '<option value="">选择模型</option>';
            models.forEach(function(m) {
                var opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = m.name;
                if (m.is_default) opt.selected = true;
                select.appendChild(opt);
            });
            select.onchange = function() {
                currentModelId = this.value ? parseInt(this.value) : null;
            };
        }
    });
}

function updateModeIndicator(isQueryMode) {
    currentMode = isQueryMode ? 'query' : 'chat';
    var indicator = document.getElementById('modeIndicator');
    var toggleBtn = document.getElementById('modeToggleBtn');
    if (isQueryMode) {
        indicator.className = 'mode-indicator query';
        indicator.innerHTML = '<span>📊</span><span>问数模式</span>';
        toggleBtn.textContent = '切换为对话';
    } else {
        indicator.className = 'mode-indicator chat';
        indicator.innerHTML = '<span>💬</span><span>对话模式</span>';
        toggleBtn.textContent = '切换为问数';
    }
}

function toggleMode() {
    updateModeIndicator(currentMode === 'chat');
}

function deleteConv(id) {
    if (!confirm('确定删除该会话？')) return;
    apiPost({ action: 'delete', id: id }).then(function(res) {
        if (res.code === 0) {
            if (currentSessionId === id) newChat();
            loadConvList();
        }
    });
}

function setEmployee(emp) {
    currentEmployee = emp;
    document.getElementById('employeeTag').classList.add('show');
    document.getElementById('employeeLabel').textContent = '@' + emp.name;
    if (currentSessionId) {
        apiPost({
            action: 'set_employee',
            session_id: currentSessionId,
            employee_id: emp.id
        });
    }
}

function clearEmployee() {
    currentEmployee = null;
    document.getElementById('employeeTag').classList.remove('show');
}

function loadEmployees() {
    apiGet('/user/chat/api?action=employees').then(function(res) {
        if (res.code === 0) employees = res.data || [];
    });
}

function showAtPopup(filter) {
    var popup = document.getElementById('atPopup');
    var items = employees.filter(function(e) {
        return !filter || e.name.indexOf(filter) >= 0;
    });
    if (!items.length) {
        popup.classList.remove('show');
        return;
    }
    popup.innerHTML = '';
    items.forEach(function(emp) {
        var div = document.createElement('div');
        div.className = 'at-item';
        div.innerHTML = '<span class="at-avatar">' + (emp.avatar || '🤖') + '</span>' +
            '<span>' + emp.name + '</span>';
        div.onclick = function() {
            setEmployee(emp);
            var input = document.getElementById('msgInput');
            var val = input.value;
            var atIdx = val.lastIndexOf('@');
            if (atIdx >= 0) {
                input.value = val.substring(0, atIdx);
            }
            popup.classList.remove('show');
            input.focus();
        };
        popup.appendChild(div);
    });
    popup.classList.add('show');
}

function sendMessage() {
    if (sending) return;
    var input = document.getElementById('msgInput');
    var content = input.value.trim();
    if (!content) return;

    sending = true;
    document.getElementById('sendBtn').disabled = true;
    appendMessage('user', content);
    input.value = '';

    // 使用显式模式切换，@ 触发可覆盖为 query 模式
    var mode = currentMode;
    if (content.indexOf('@') >= 0 || currentEmployee !== null) {
        mode = 'query';
    }
    updateModeIndicator(mode === 'query');

    var hasAt = content.indexOf('@') >= 0 || currentEmployee !== null;
    var typing = document.createElement('div');
    typing.className = 'typing';
    typing.id = 'typingIndicator';
    typing.textContent = hasAt ? '📊 AI 正在分析数据...' : '💬 AI 正在思考...';
    document.getElementById('chatArea').appendChild(typing);

    apiPost({
        action: 'send',
        content: content,
        session_id: currentSessionId,
        mode: mode,
        employee_id: currentEmployee ? currentEmployee.id : null,
        model_id: currentModelId
    }).then(function(res) {
        var t = document.getElementById('typingIndicator');
        if (t) t.remove();
        sending = false;
        document.getElementById('sendBtn').disabled = false;
        if (res.code === 0) {
            currentSessionId = res.data.session_id;
            document.getElementById('exportPdfBtn').disabled = false;
            appendMessage('assistant', res.data.reply);
            loadConvList();
        } else {
            appendMessage('assistant', '错误: ' + (res.msg || '发送失败'));
        }
    }).catch(function() {
        var t = document.getElementById('typingIndicator');
        if (t) t.remove();
        sending = false;
        document.getElementById('sendBtn').disabled = false;
    });
}

document.getElementById('newChatBtn').onclick = newChat;
document.getElementById('sendBtn').onclick = sendMessage;
document.getElementById('clearEmployeeBtn').onclick = clearEmployee;
document.getElementById('exportPdfBtn').onclick = function() {
    if (!currentSessionId) return;
    window.open('/user/chat/export?id=' + currentSessionId, '_blank');
};

var msgInput = document.getElementById('msgInput');
msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});
msgInput.addEventListener('input', function() {
    var val = msgInput.value;
    var atIdx = val.lastIndexOf('@');
    if (atIdx >= 0 && (atIdx === 0 || val[atIdx - 1] === ' ')) {
        showAtPopup(val.substring(atIdx + 1));
    } else {
        document.getElementById('atPopup').classList.remove('show');
    }
});

showWelcomeBox();
loadEmployees();
loadModels();
loadConvList();
</script>
</body>
</html>
