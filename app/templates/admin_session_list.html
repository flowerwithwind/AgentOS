<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - XHAgentOS</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('lib/layui/css/layui.css') }}">
    <style>
        body { padding: 15px; background: #f5f6fa; }
        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8e8e8;
        }
        .page-title .layui-icon {
            font-size: 20px;
            margin-right: 6px;
            color: #FFB800;
        }
        .toolbar {
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .title-cell {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
            color: #1E9FFF;
        }
        .title-cell:hover {
            text-decoration: underline;
        }
        .chat-container {
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
        .chat-message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
        }
        .chat-message.user {
            background: #e8f4ff;
            border-left: 3px solid #1E9FFF;
        }
        .chat-message.assistant {
            background: #f0f0f0;
            border-left: 3px solid #5fb878;
        }
        .chat-message .role {
            font-weight: bold;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .chat-message .content {
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .chat-message .time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
            text-align: right;
        }
    </style>
</head>
<body>
<div>
    <div class="page-title">
        <i class="layui-icon layui-icon-log"></i> 会话管理
    </div>

    <div class="toolbar">
        <div class="search-box">
            <input type="text" id="searchKeyword" placeholder="用户名" class="layui-input" style="width: 150px;">
            <input type="text" id="dateFrom" placeholder="开始日期" class="layui-input" style="width: 120px;">
            <span style="line-height: 38px;">至</span>
            <input type="text" id="dateTo" placeholder="结束日期" class="layui-input" style="width: 120px;">
            <button class="layui-btn layui-btn-sm" onclick="doSearch()">
                <i class="layui-icon layui-icon-search"></i> 搜索
            </button>
        </div>
    </div>

    <table id="sessionTable" lay-filter="sessionTable"></table>
</div>

<script src="{{ static_url('lib/layui/layui.js') }}"></script>
<script>
function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : undefined;
}
layui.$.ajaxSetup({
    beforeSend: function(xhr) {
        xhr.setRequestHeader('X-Xsrftoken', getCookie('_xsrf'));
    }
});

layui.use(['table', 'layer', 'laydate'], function(){
    var table = layui.table;
    var layer = layui.layer;
    var laydate = layui.laydate;
    var $ = layui.$;

    // 日期选择器
    laydate.render({ elem: '#dateFrom', type: 'date' });
    laydate.render({ elem: '#dateTo', type: 'date' });

    var tableIns = table.render({
        elem: '#sessionTable',
        url: '/admin/session/api',
        page: {
            limit: 10,
            limits: [10, 20, 50]
        },
        cols: [[
            {type: 'numbers', title: '序号', width: 70, align: 'center'},
            {field: 'id', title: '会话ID', width: 90, align: 'center'},
            {field: 'username', title: '用户名', width: 120},
            {field: 'title', title: '会话标题', minWidth: 180,
                templet: function(d){
                    return '<span class="title-cell" onclick="viewMessages(' + d.id + ')">' + (d.title || '新会话') + '</span>';
                }},
            {field: 'message_count', title: '消息数', width: 90, align: 'center'},
            {field: 'start_time', title: '开始时间', width: 170, sort: true},
            {field: 'end_time', title: '结束时间', width: 170},
            {field: 'created_at', title: '创建时间', width: 170, sort: true, hide: true},
            {title: '操作', width: 100, align: 'center',
                templet: function(d){
                    return '<a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>';
                }}
        ]],
        response: {
            statusCode: 0
        },
        parseData: function(res){
            return {
                code: res.code,
                msg: res.msg,
                count: res.count,
                data: res.data
            };
        }
    });

    // 搜索
    window.doSearch = function() {
        tableIns.reload({
            where: {
                keyword: $('#searchKeyword').val(),
                date_from: $('#dateFrom').val(),
                date_to: $('#dateTo').val()
            },
            page: { curr: 1 }
        });
    };

    // 回车搜索
    $('#searchKeyword').on('keydown', function(e){
        if(e.keyCode === 13) doSearch();
    });

    // 监听工具条
    table.on('tool(sessionTable)', function(obj){
        var data = obj.data;
        if(obj.event === 'del'){
            layer.confirm('确定要删除该会话吗？<br>此操作将同时删除该会话下的所有消息记录。', {icon: 3, title: '警告'}, function(index){
                $.post('/admin/session/delete', {id: data.id}, function(res){
                    if(res.code === 0){
                        layer.msg('删除成功', {icon: 1});
                        tableIns.reload();
                    } else {
                        layer.msg(res.msg, {icon: 2});
                    }
                });
                layer.close(index);
            });
        }
    });

    // 查看会话消息
    window.viewMessages = function(id) {
        var loading = layer.msg('加载中...', { icon: 16, shade: 0.3, time: false });
        $.get('/admin/session/messages', {id: id}, function(res){
            layer.close(loading);
            if(res.code !== 0){
                layer.msg(res.msg, {icon: 2});
                return;
            }
            var conv = res.data.conversation;
            var messages = res.data.messages;
            
            var html = '<div style="padding:10px 15px;background:#f5f5f5;border-bottom:1px solid #e8e8e8;">';
            html += '<strong>会话信息：</strong> ' + conv.title + ' <span style="color:#999;margin-left:15px;">用户：' + conv.username + '</span>';
            html += '<span style="color:#999;margin-left:15px;">消息数：' + messages.length + '</span>';
            html += '</div>';
            html += '<div class="chat-container" id="chatContainer">';
            
            if(messages.length === 0){
                html += '<div style="text-align:center;color:#999;padding:30px;">暂无消息记录</div>';
            } else {
                messages.forEach(function(msg){
                    var roleName = msg.role === 'user' ? '用户' : 'AI助手';
                    var roleClass = msg.role === 'user' ? 'user' : 'assistant';
                    html += '<div class="chat-message ' + roleClass + '">';
                    html += '<div class="role">' + roleName + '</div>';
                    html += '<div class="content">' + escapeHtml(msg.content) + '</div>';
                    html += '<div class="time">' + msg.created_at + '</div>';
                    html += '</div>';
                });
            }
            html += '</div>';
            
            layer.open({
                type: 1,
                title: '会话详情 - ID:' + conv.id,
                area: ['700px', '550px'],
                content: html,
                success: function(layero){
                    // 滚动到底部
                    setTimeout(function(){
                        var container = document.getElementById('chatContainer');
                        if(container) container.scrollTop = container.scrollHeight;
                    }, 100);
                }
            });
        });
    };

    // HTML转义
    function escapeHtml(text) {
        if(!text) return '';
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;')
            .replace(/\n/g, '<br>');
    }
});
</script>
</body>
</html>
