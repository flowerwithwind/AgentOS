<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - XHAgentOS</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('lib/layui/css/layui.css') }}">
    <style>
        body { padding: 15px; background: #f5f6fa; }
        .page-title { font-size: 18px; font-weight: 600; color: #1a1a2e; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #e8e8e8; }
        .page-title .layui-icon { font-size: 20px; margin-right: 6px; color: #ffb800; }
    </style>
</head>
<body>
<div>
    <div class="page-title"><i class="layui-icon layui-icon-auz"></i> 角色管理</div>
    <div style="margin-bottom:12px;">
        <button class="layui-btn layui-btn-sm" onclick="openAdd()">
            <i class="layui-icon layui-icon-add-1"></i> 新增角色
        </button>
    </div>
    <table id="roleTable" lay-filter="roleTable"></table>
</div>

<script src="{{ static_url('lib/layui/layui.js') }}"></script>
<script>
function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : undefined;
}
layui.$.ajaxSetup({
    beforeSend: function(xhr) { xhr.setRequestHeader('X-Xsrftoken', getCookie('_xsrf')); }
});

layui.use(['table', 'layer'], function(){
    var table = layui.table, layer = layui.layer, $ = layui.$;
    table.render({
        elem: '#roleTable',
        url: '/admin/roles/api',
        page: false,
        cols: [[
            {type: 'numbers', title: '序号', width: 80, align: 'center'},
            {field: 'name', title: '角色名称', minWidth: 160},
            {field: 'user_count', title: '用户数', width: 100, align: 'center'},
            {field: 'is_system', title: '系统角色', width: 100, align: 'center',
                templet: function(d){
                    return d.is_system ? '<span style="color:#ffb800;">是</span>' : '<span style="color:#8c8c8c;">否</span>';
                }},
            {title: '操作', width: 150, align: 'center',
                templet: function(d){
                    var btn = '<a class="layui-btn layui-btn-xs" onclick="openEdit('+d.id+')">编辑权限</a>';
                    if(!d.is_system){
                        btn += '<a class="layui-btn layui-btn-xs layui-btn-danger" onclick="delRole('+d.id+')">删除</a>';
                    }
                    return btn;
                }}
        ]]
    });

    window.openAdd = function() {
        layer.prompt({title: '请输入角色名称', formType: 0}, function(val, index){
            $.post('/admin/roles/add', {name: val}, function(res){
                if(res.code===0){
                    layer.msg('创建成功', {icon:1});
                    table.reload('roleTable');
                } else { layer.msg(res.msg, {icon:2}); }
                layer.close(index);
            });
        });
    };

    window.openEdit = function(id) {
        layer.open({ type:2, title:'角色权限', area:['600px','500px'],
            content:'/admin/permissions?role_id='+id, end:function(){ table.reload('roleTable'); }});
    };

    window.delRole = function(id) {
        layer.confirm('确定删除该角色？关联用户将还原为普通用户。', {icon:3, title:'提示'}, function(idx){
            $.post('/admin/roles/delete', {id:id}, function(res){
                if(res.code===0){ layer.msg('删除成功', {icon:1}); table.reload('roleTable'); }
                else { layer.msg(res.msg, {icon:2}); }
            }); layer.close(idx);
        });
    };
});
</script>
</body>
</html>
