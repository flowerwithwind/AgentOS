<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - XHAgentOS</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('lib/layui/css/layui.css') }}">
    <style>
        body { padding: 15px; background: #f5f6fa; }
        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8e8e8;
        }
        .page-title .layui-icon {
            font-size: 20px;
            margin-right: 6px;
            color: #1e9fff;
        }
        .toolbar {
            margin-bottom: 12px;
        }
        .toolbar .sel-info {
            font-size: 13px;
            color: #666;
            margin-left: 8px;
        }
    </style>
</head>
<body>
<div>
    <div class="page-title">
        <i class="layui-icon layui-icon-template-1"></i> 数据仓库
    </div>

    <div class="layui-form" style="margin-bottom: 12px;">
        <div class="layui-inline">
            <label class="layui-form-label" style="width:auto;">采集源</label>
            <div class="layui-input-inline">
                <select id="filterSource">
                    <option value="">全部</option>
                    {% for s in sources %}
                    <option value="{{ s['id'] }}">{{ s['name'] }}</option>
                    {% end %}
                </select>
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label" style="width:auto;">关键词</label>
            <div class="layui-input-inline">
                <input id="filterKeyword" class="layui-input" placeholder="搜索标题/摘要...">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label" style="width:auto;">起始时间</label>
            <div class="layui-input-inline">
                <input id="filterDateFrom" type="date" class="layui-input">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label" style="width:auto;">截止时间</label>
            <div class="layui-input-inline">
                <input id="filterDateTo" type="date" class="layui-input">
            </div>
        </div>
        <div class="layui-inline">
            <button class="layui-btn layui-btn-sm" onclick="reloadTable()">
                <i class="layui-icon layui-icon-search"></i> 查询
            </button>
            <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="resetFilter()">
                <i class="layui-icon layui-icon-refresh"></i> 重置
            </button>
        </div>
    </div>

    <div class="toolbar">
        <button class="layui-btn layui-btn-sm layui-btn-normal" id="btnDeepCollect" onclick="startDeepCollect()" disabled>
            <i class="layui-icon layui-icon-senior"></i> 深度采集
        </button>
        <span class="sel-info" id="selInfo">已选 0 条</span>
    </div>

    <table id="dataTable" lay-filter="dataTable"></table>
</div>

<script src="{{ static_url('lib/layui/layui.js') }}"></script>
<script>
function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : undefined;
}
layui.$.ajaxSetup({
    beforeSend: function(xhr) { xhr.setRequestHeader('X-Xsrftoken', getCookie('_xsrf')); }
});

var selectedIds = {};
var currentData = [];
var progressTimer = null;

layui.use(['table', 'layer', 'form'], function(){
    var table = layui.table;
    var layer = layui.layer;
    var $ = layui.$;
    var form = layui.form;

    table.render({
        elem: '#dataTable',
        url: '/admin/lookout/warehouse/api',
        page: {
            limit: 20,
            limits: [20, 50, 100]
        },
        where: getFilterParams(),
        cols: [[
            {type: 'checkbox', width: 50, align: 'center'},
            {field: 'id', title: 'ID', width: 80, align: 'center', sort: true},
            {field: 'title', title: '标题', minWidth: 200,
                templet: function(d){
                    var title = d.title || '无标题';
                    if(d.url){
                        return '<a href="' + d.url + '" target="_blank" style="color:#1e9fff;">' + title + '</a>';
                    }
                    return title;
                }
            },
            {field: 'source_name_label', title: '来源', width: 120, align: 'center',
                templet: function(d){ return d.source_name_label || d.source_name || '-'; }
            },
            {field: 'keyword', title: '关键词', width: 120, align: 'center'},
            {field: 'summary', title: '摘要', minWidth: 200,
                templet: function(d){
                    var summary = d.summary || '';
                    var display = summary.length > 60 ? summary.substr(0, 60) + '...' : summary;
                    return '<span title="' + summary + '">' + display + '</span>';
                }
            },
            {field: 'collected_at', title: '采集时间', width: 170, align: 'center', sort: true},
            {title: '操作', width: 100, align: 'center',
                templet: function(d){
                    var cls = d.full_content ? 'layui-btn-normal' : 'layui-btn-primary';
                    var txt = d.full_content ? '已采' : '查看';
                    return '<button class="layui-btn layui-btn-xs ' + cls + '" onclick="viewContent(' + d.id + ')">' + txt + '</button>';
                }
            }
        ]],
        response: {
            statusCode: 0
        },
        parseData: function(res){
            currentData = res.data || [];
            return {
                code: res.code,
                msg: res.msg,
                count: res.count,
                data: res.data
            };
        },
        done: function(res, curr, count){
            // 恢复选中状态
            var checkStatus = table.checkStatus('dataTable');
            selectedIds = {};
            checkStatus.data.forEach(function(row){
                selectedIds[row.id] = true;
            });
            updateSelectedInfo();
        }
    });

    // 监听复选框选择
    table.on('checkbox(dataTable)', function(obj){
        if(obj.type === 'all'){
            if(obj.checked){
                currentData.forEach(function(r){ selectedIds[r.id] = true; });
            } else {
                currentData.forEach(function(r){ delete selectedIds[r.id]; });
            }
        } else {
            if(obj.checked){
                selectedIds[obj.data.id] = true;
            } else {
                delete selectedIds[obj.data.id];
            }
        }
        updateSelectedInfo();
    });

    window.reloadTable = function(){
        table.reload('dataTable', {
            page: { curr: 1 },
            where: getFilterParams()
        });
    };

    window.resetFilter = function(){
        $('#filterSource').val('');
        $('#filterKeyword').val('');
        $('#filterDateFrom').val('');
        $('#filterDateTo').val('');
        form.render('select');
        reloadTable();
    };

    window.viewContent = function(recordId){
        $.get('/admin/lookout/warehouse/deep-collect/content?id=' + recordId, function(res){
            if(res.code === 0 && res.data){
                var d = res.data;
                var content = d.full_content || '暂无内容';
                layer.open({
                    type: 1,
                    title: d.title || '内容详情',
                    content: '<div style="padding:20px;max-height:500px;overflow-y:auto;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-all;">' + escapeHtml(content) + '</div>',
                    area: ['700px', '500px']
                });
            } else {
                layer.msg(res.msg || '暂无内容', {icon: 2});
            }
        });
    };

    window.startDeepCollect = function(){
        var ids = Object.keys(selectedIds);
        if(ids.length === 0){
            layer.msg('请先选择要采集的数据', {icon: 2});
            return;
        }

        if(progressTimer) { clearInterval(progressTimer); progressTimer = null; }

        layer.open({
            type: 1,
            title: '深度采集中...',
            area: ['480px', '260px'],
            shadeClose: false,
            closeBtn: 0,
            id: 'progressLayer',
            content: '<div style="padding:20px;">' +
                '<div class="layui-progress layui-progress-big" lay-showpercent="true">' +
                    '<div class="layui-progress-bar layui-bg-blue" id="progressBar" lay-percent="0%"></div>' +
                '</div>' +
                '<div style="display:flex;justify-content:space-between;margin-top:12px;font-size:13px;color:#666;">' +
                    '<span id="progressStats">0 / ' + ids.length + '</span>' +
                    '<span id="progressStatus">准备中...</span>' +
                '</div>' +
                '<div id="progressCurrent" style="margin-top:8px;font-size:12px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>' +
                '<div id="progressErrors" style="margin-top:8px;max-height:60px;overflow-y:auto;font-size:11px;color:#ff5722;"></div>' +
            '</div>'
        });

        layui.element.init();

        $.post('/admin/lookout/warehouse/deep-collect', {
            record_ids: ids.join(',')
        }, function(res){
            if(res.code === 0){
                pollProgress(res.task_id, ids.length);
            } else {
                layer.closeAll();
                layer.msg(res.msg, {icon: 2});
            }
        });
    };

    function pollProgress(taskId, total){
        progressTimer = setInterval(function(){
            $.get('/admin/lookout/warehouse/deep-collect/progress?task_id=' + taskId, function(res){
                if(res.code !== 0) return;
                var p = res.data;
                var pct = p.total > 0 ? Math.round(p.completed / p.total * 100) + '%' : '0%';

                $('#progressBar').attr('lay-percent', pct);
                layui.element.init();

                $('#progressStats').text(p.completed + ' / ' + p.total);
                $('#progressCurrent').text(p.current ? '当前: ' + p.current : '');

                if(p.status === 'running'){
                    $('#progressStatus').text('采集中...');
                } else if(p.status === 'done'){
                    $('#progressStatus').text('完成!');
                    clearInterval(progressTimer);
                    progressTimer = null;
                    setTimeout(function(){
                        layer.closeAll();
                        layer.msg('深度采集完成，共 ' + p.completed + ' 条', {icon: 1});
                        table.reload('dataTable');
                    }, 1500);
                } else if(p.status === 'error'){
                    $('#progressStatus').text('出错');
                    clearInterval(progressTimer);
                    progressTimer = null;
                    setTimeout(function(){
                        layer.closeAll();
                        layer.msg('采集出错', {icon: 2});
                    }, 2000);
                }

                if(p.errors && p.errors.length > 0){
                    var errHtml = '';
                    p.errors.forEach(function(e){ errHtml += '<div>' + e + '</div>'; });
                    $('#progressErrors').html(errHtml);
                }
            });
        }, 800);
    }
});

function getFilterParams(){
    var params = {};
    var sid = layui.$('#filterSource').val();
    var kw = layui.$('#filterKeyword').val();
    if(kw) kw = kw.trim();
    var df = layui.$('#filterDateFrom').val();
    var dt = layui.$('#filterDateTo').val();
    if(sid) params.source_id = sid;
    if(kw) params.keyword = kw;
    if(df) params.date_from = df;
    if(dt) params.date_to = dt;
    return params;
}

function updateSelectedInfo(){
    var cnt = Object.keys(selectedIds).length;
    layui.$('#selInfo').text('已选 ' + cnt + ' 条');
    layui.$('#btnDeepCollect').prop('disabled', cnt === 0);
    if(cnt === 0){
        layui.$('#btnDeepCollect').addClass('layui-btn-disabled');
    } else {
        layui.$('#btnDeepCollect').removeClass('layui-btn-disabled');
    }
}

function escapeHtml(str){
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
