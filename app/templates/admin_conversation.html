<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - XHAgentOS</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('lib/layui/css/layui.css') }}">
    <style>
        body { padding: 15px; background: #f5f6fa; }
        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8e8e8;
        }
        .page-title .layui-icon {
            font-size: 20px;
            margin-right: 6px;
            color: #1e9fff;
        }
        .cell-limit {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
        }
    </style>
</head>
<body>
<div>
    <div class="page-title">
        <i class="layui-icon layui-icon-dialogue"></i> 对话记录管理
    </div>

    <form class="layui-form" style="margin-bottom: 12px;">
        <div class="layui-inline">
            <label class="layui-form-label" style="width:auto;">用户名</label>
            <div class="layui-input-inline" style="width: 140px;">
                <input type="text" id="filterUser" placeholder="输入用户名..." class="layui-input">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label" style="width:auto;">关键词</label>
            <div class="layui-input-inline" style="width: 140px;">
                <input type="text" id="filterKeyword" placeholder="搜索提问/回复..." class="layui-input">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label" style="width:auto;">开始日期</label>
            <div class="layui-input-inline" style="width: 140px;">
                <input type="date" id="filterDateFrom" class="layui-input">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label" style="width:auto;">结束日期</label>
            <div class="layui-input-inline" style="width: 140px;">
                <input type="date" id="filterDateTo" class="layui-input">
            </div>
        </div>
        <div class="layui-inline">
            <button type="button" class="layui-btn layui-btn-sm layui-btn-normal" onclick="doSearch()">
                <i class="layui-icon layui-icon-search"></i> 搜索
            </button>
            <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" onclick="resetFilter()">
                重置
            </button>
            <button type="button" class="layui-btn layui-btn-sm" onclick="doExport()">
                <i class="layui-icon layui-icon-export"></i> 导出 CSV
            </button>
        </div>
    </form>

    <table id="convTable" lay-filter="convTable"></table>
</div>

<script src="{{ static_url('lib/layui/layui.js') }}"></script>
<script>
function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : undefined;
}

layui.use(['table', 'layer'], function(){
    var table = layui.table;
    var layer = layui.layer;
    var $ = layui.$;
    window.table = table;
    window.layer = layer;
    window.$ = $;

    $.ajaxSetup({
        beforeSend: function(xhr) { xhr.setRequestHeader('X-Xsrftoken', getCookie('_xsrf')); }
    });

    table.render({
        elem: '#convTable',
        url: '/admin/conversations/api',
        page: true,
        limit: 20,
        limits: [10, 20, 50],
        where: getFilterParams(),
        response: {
            statusCode: 0
        },
        parseData: function(res){
            return {
                code: res.code,
                msg: res.msg,
                count: res.count,
                data: res.data
            };
        },
        cols: [[
            {field: 'id', title: 'ID', width: 60},
            {field: 'username', title: '用户名', width: 100},
            {field: 'model_name', title: '模型', width: 120},
            {field: 'question', title: '提问', templet: function(d){
                return '<span class="cell-limit" title="'+escapeHtml(d.question)+'">'+escapeHtml(d.question)+'</span>';
            }},
            {field: 'answer', title: '回复', templet: function(d){
                return '<span class="cell-limit" title="'+escapeHtml(d.answer)+'">'+escapeHtml(d.answer)+'</span>';
            }},
            {field: 'created_at', title: '时间', width: 160},
            {field: 'right', title: '操作', width: 80, templet: function(d){
                return '<button class="layui-btn layui-btn-xs" onclick="showDetail('+d.id+')">详情</button>';
            }}
        ]]
    });
});

function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getFilterParams() {
    return {
        username: layui.$('#filterUser').val(),
        keyword: layui.$('#filterKeyword').val(),
        date_from: layui.$('#filterDateFrom').val(),
        date_to: layui.$('#filterDateTo').val()
    };
}

function doSearch() {
    window.table.reload('convTable', {where: getFilterParams()});
}

function resetFilter() {
    layui.$('#filterUser').val('');
    layui.$('#filterKeyword').val('');
    layui.$('#filterDateFrom').val('');
    layui.$('#filterDateTo').val('');
    doSearch();
}

function showDetail(id) {
    layui.$.get('/admin/conversations/api?page=1&limit=9999', function(res){
        if(res.code === 0) {
            var item = res.data.find(function(d){return d.id == id;});
            if(item) {
                var html = '<div style="padding:10px;">'
                    + '<p><strong>用户名：</strong>'+escapeHtml(item.username)+'</p>'
                    + '<p><strong>模型：</strong>'+escapeHtml(item.model_name||'未知')+'</p>'
                    + '<p><strong>时间：</strong>'+item.created_at+'</p>'
                    + '<hr>'
                    + '<p><strong>提问：</strong></p>'
                    + '<div style="background:#f8f8f8;padding:10px;border-radius:6px;margin:6px 0;max-height:150px;overflow:auto;white-space:pre-wrap;">'+escapeHtml(item.question)+'</div>'
                    + '<p><strong>回复：</strong></p>'
                    + '<div style="background:#f8f8f8;padding:10px;border-radius:6px;margin:6px 0;max-height:250px;overflow:auto;white-space:pre-wrap;">'+escapeHtml(item.answer)+'</div>'
                    + '</div>';
                window.layer.open({
                    type: 1,
                    title: '对话详情 #'+id,
                    content: html,
                    area: ['600px', '500px']
                });
            }
        }
    });
}

function doExport() {
    var params = $.param(getFilterParams());
    window.open('/admin/conversations/export?' + params);
}
</script>
</body>
</html>
