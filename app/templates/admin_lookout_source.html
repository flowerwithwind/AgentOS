<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - XHAgentOS</title>
    <link rel="stylesheet" type="text/css" href="{{ static_url('lib/layui/css/layui.css') }}">
    <style>
        body { padding: 15px; background: #f5f6fa; }
        .page-title { font-size: 18px; font-weight: 600; color: #1a1a2e; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #e8e8e8; }
        .page-title .layui-icon { font-size: 20px; margin-right: 6px; color: #1e9fff; }
        .toolbar { margin-bottom: 12px; }
    </style>
</head>
<body>
<div>
    <div class="page-title"><i class="layui-icon layui-icon-survey"></i> 瞭望源管理</div>
    <div class="toolbar">
        <button class="layui-btn layui-btn-sm" onclick="openCreate()">
            <i class="layui-icon layui-icon-add-1"></i> 新增瞭望源
        </button>
    </div>
    <table id="sourceTable" lay-filter="sourceTable"></table>
</div>

<script src="{{ static_url('lib/layui/layui.js') }}"></script>
<script>
function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : undefined;
}
layui.$.ajaxSetup({
    beforeSend: function(xhr) { xhr.setRequestHeader('X-Xsrftoken', getCookie('_xsrf')); }
});

layui.use(['table', 'layer'], function(){
    var table = layui.table, layer = layui.layer, $ = layui.$;

    table.render({
        elem: '#sourceTable',
        url: '/admin/lookout/sources/api',
        page: {
            limit: 10,
            limits: [10, 20, 50]
        },
        cols: [[
            {type: 'numbers', title: '序号', width: 80, align: 'center'},
            {field: 'id', title: 'ID', width: 80, align: 'center'},
            {field: 'name', title: '名称', minWidth: 140},
            {field: 'url_template', title: 'URL 模板', minWidth: 200},
            {field: 'pn_param', title: '分页参数', width: 100, align: 'center'},
            {field: 'page_size', title: '每页条数', width: 100, align: 'center'},
            {field: 'status', title: '状态', width: 90, align: 'center',
                templet: function(d){
                    return d.status ? '<span style="color:#5fb878;">启用</span>' : '<span style="color:#ff5722;">禁用</span>';
                }},
            {field: 'create_at', title: '创建时间', minWidth: 180},
            {title: '操作', width: 160, align: 'center',
                templet: function(d){
                    return '<a class="layui-btn layui-btn-xs" onclick="openEdit('+d.id+')">编辑</a>' +
                           '<a class="layui-btn layui-btn-xs layui-btn-danger" onclick="openDelete('+d.id+')">删除</a>';
                }}
        ]],
        response: {
            statusCode: 0
        },
        parseData: function(res){
            return {
                code: res.code,
                msg: res.msg,
                count: res.count,
                data: res.data
            };
        }
    });

    window.openCreate = function() {
        layer.open({
            type: 1,
            title: '新增瞭望源',
            area: ['560px', 'auto'],
            content:
                '<div class="layui-form" style="padding:20px;">' +
                '  <div class="layui-form-item">' +
                '    <label class="layui-form-label">名称</label>' +
                '    <div class="layui-input-block">' +
                '      <input type="text" id="f_name" class="layui-input" placeholder="如 百度新闻">' +
                '    </div>' +
                '  </div>' +
                '  <div class="layui-form-item">' +
                '    <label class="layui-form-label">URL 模板</label>' +
                '    <div class="layui-input-block">' +
                '      <input type="text" id="f_url" class="layui-input" placeholder="https://...keyword={}">' +
                '    </div>' +
                '  </div>' +
                '  <div class="layui-form-item">' +
                '    <label class="layui-form-label">关键词占位符</label>' +
                '    <div class="layui-input-block">' +
                '      <input type="text" id="f_ph" class="layui-input" value="{}">' +
                '    </div>' +
                '  </div>' +
                '  <div class="layui-form-item">' +
                '    <label class="layui-form-label">分页参数名</label>' +
                '    <div class="layui-input-block">' +
                '      <input type="text" id="f_pn" class="layui-input" value="pn">' +
                '    </div>' +
                '  </div>' +
                '  <div class="layui-form-item">' +
                '    <label class="layui-form-label">每页条数</label>' +
                '    <div class="layui-input-block">' +
                '      <input type="number" id="f_ps" class="layui-input" value="10">' +
                '    </div>' +
                '  </div>' +
                '  <div class="layui-form-item" style="margin-bottom:0;">' +
                '    <div class="layui-input-block">' +
                '      <button class="layui-btn" onclick="submitCreate()">创建</button>' +
                '    </div>' +
                '  </div>' +
                '</div>',
            shadeClose: true
        });
    };

    window.submitCreate = function() {
        var name = $('#f_name').val().trim();
        var url = $('#f_url').val().trim();
        if(!name || !url) { layer.msg('请填写完整信息', {icon: 2}); return; }
        $.post('/admin/lookout/sources/add', {
            name: name, url_template: url,
            pn_param: $('#f_pn').val() || 'pn',
            page_size: parseInt($('#f_ps').val()) || 10,
            keyword_placeholder: $('#f_ph').val() || '{}'
        }, function(res){
            if(res.code === 0){ layer.msg('创建成功', {icon: 1}); layer.closeAll(); table.reload('sourceTable'); }
            else { layer.msg(res.msg, {icon: 2}); }
        });
    };

    window.openEdit = function(id) {
        $.get('/admin/lookout/sources/api?limit=100', function(res){
            var source = null;
            if(res.data) res.data.forEach(function(s){ if(s.id === id) source = s; });
            if(!source) return;
            layer.open({
                type: 1,
                title: '编辑瞭望源',
                area: ['560px', 'auto'],
                content:
                    '<div class="layui-form" style="padding:20px;">' +
                    '  <div class="layui-form-item">' +
                    '    <label class="layui-form-label">名称</label>' +
                    '    <div class="layui-input-block">' +
                    '      <input type="text" id="e_name" class="layui-input" value="'+source.name+'">' +
                    '    </div>' +
                    '  </div>' +
                    '  <div class="layui-form-item">' +
                    '    <label class="layui-form-label">URL 模板</label>' +
                    '    <div class="layui-input-block">' +
                    '      <input type="text" id="e_url" class="layui-input" value="'+source.url_template+'">' +
                    '    </div>' +
                    '  </div>' +
                    '  <div class="layui-form-item">' +
                    '    <label class="layui-form-label">关键词占位符</label>' +
                    '    <div class="layui-input-block">' +
                    '      <input type="text" id="e_ph" class="layui-input" value="'+source.keyword_placeholder+'">' +
                    '    </div>' +
                    '  </div>' +
                    '  <div class="layui-form-item">' +
                    '    <label class="layui-form-label">分页参数名</label>' +
                    '    <div class="layui-input-block">' +
                    '      <input type="text" id="e_pn" class="layui-input" value="'+source.pn_param+'">' +
                    '    </div>' +
                    '  </div>' +
                    '  <div class="layui-form-item">' +
                    '    <label class="layui-form-label">每页条数</label>' +
                    '    <div class="layui-input-block">' +
                    '      <input type="number" id="e_ps" class="layui-input" value="'+source.page_size+'">' +
                    '    </div>' +
                    '  </div>' +
                    '  <div class="layui-form-item" style="margin-bottom:0;">' +
                    '    <div class="layui-input-block">' +
                    '      <button class="layui-btn" onclick="submitEdit('+id+')">保存</button>' +
                    '    </div>' +
                    '  </div>' +
                    '</div>',
                shadeClose: true
            });
        });
    };

    window.submitEdit = function(id) {
        $.post('/admin/lookout/sources/edit', {
            id: id, name: $('#e_name').val().trim(),
            url_template: $('#e_url').val().trim(),
            pn_param: $('#e_pn').val() || 'pn',
            page_size: parseInt($('#e_ps').val()) || 10,
            keyword_placeholder: $('#e_ph').val() || '{}'
        }, function(res){
            if(res.code === 0){ layer.msg('保存成功', {icon: 1}); layer.closeAll(); table.reload('sourceTable'); }
            else { layer.msg(res.msg, {icon: 2}); }
        });
    };

    window.openDelete = function(id) {
        layer.confirm('确定删除此瞭望源？', {icon: 3, title: '提示'}, function(idx){
            $.post('/admin/lookout/sources/delete', {id: id}, function(res){
                if(res.code === 0){ layer.msg('删除成功', {icon: 1}); table.reload('sourceTable'); }
                else { layer.msg(res.msg, {icon: 2}); }
            });
            layer.close(idx);
        });
    };
});
</script>
</body>
</html>
